<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSync · User Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1C2B4A;--green:#2E8B57;--green-bg:#E8F5EE;--amber:#C8922A;--amber-bg:#FEF3E2;--red:#C0392B;--red-bg:#FDECEA;--mist:#8A93A8;--border:#DDD9EC;--surface:#FFFFFF;--purple:#5B3FA8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F3FA;color:var(--navy);font-size:13px;}
.topbar{background:var(--navy);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-title{font-size:15px;font-weight:600;color:#fff;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.content{max-width:760px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
.card{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;}
.card-head{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;}
.card-body{padding:20px;}

/* User rows */
.user-row{display:grid;grid-template-columns:1fr 110px 130px 180px;align-items:center;padding:11px 0;border-bottom:0.5px solid #F5F3FA;gap:8px;}
.user-row:last-child{border-bottom:none;}
.user-row.inactive{opacity:.5;}
.user-info{min-width:0;}
.user-name{font-size:13px;font-weight:500;}
.user-email{font-size:11px;color:var(--mist);margin-top:1px;}
.user-status-cell{display:flex;justify-content:center;}
.user-role-cell{display:flex;justify-content:center;}
.user-actions-cell{display:flex;justify-content:center;gap:5px;}

/* Role badges */
.role-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;}
.rb-admin{background:rgba(28,43,74,.1);color:var(--navy);}
.rb-manager{background:var(--green-bg);color:var(--green);}
.rb-hospital_manager{background:var(--green-bg);color:var(--green);}
.rb-clinical{background:var(--green-bg);color:var(--green);}
.rb-receiver{background:#E6F1FB;color:#1A6FAD;}
.rb-inventory_lead{background:#FEF3E2;color:var(--amber);}

/* Status pill */
.status-pill{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;}
.sp-active{background:var(--green-bg);color:var(--green);}
.sp-inactive{background:#F0EEF8;color:var(--mist);}

/* Table column headers */
.col-headers{display:grid;grid-template-columns:1fr 110px 130px 180px;padding:8px 20px;background:#F8F7FC;border-bottom:0.5px solid var(--border);}
.col-label{font-size:10px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.06em;}
.col-label.center{text-align:center;}
.action-group{display:flex;gap:5px;}

/* Action buttons */
.action-btn{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:0.5px solid;}
.btn-deactivate{background:#FEF3E2;color:var(--amber);border-color:#F0D090;}
.btn-deactivate:hover{background:#FDE8C0;}
.btn-activate{background:var(--green-bg);color:var(--green);border-color:#B0D8C0;}
.btn-activate:hover{background:#D0EDD8;}
.btn-delete{background:var(--red-bg);color:var(--red);border-color:#F0AAAA;}
.btn-delete:hover{background:#FACACA;}

/* Confirm delete inline */
.confirm-row{background:#FEF3E2;border-radius:8px;padding:10px 14px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.confirm-text{font-size:12px;color:var(--amber);}
.confirm-actions{display:flex;gap:6px;}
.btn-confirm-del{padding:5px 12px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-cancel-del{padding:5px 12px;background:#fff;color:var(--mist);border:0.5px solid var(--border);border-radius:7px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}


/* Data access scope */
.scope-section{margin-bottom:14px;}
.scope-radios{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.scope-radio{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border:0.5px solid var(--border);border-radius:9px;transition:border-color .12s;}
.scope-radio:hover{border-color:#9B8EC4;}
.scope-radio.selected{border-color:var(--navy);background:#F8F7FC;}
.scope-radio input[type=radio]{width:14px;height:14px;accent-color:var(--navy);flex-shrink:0;}
.scope-radio-label{font-size:13px;font-weight:500;color:var(--navy);}
.scope-radio-sub{font-size:11px;color:var(--mist);margin-top:1px;}
.scope-sub-field{margin-top:10px;padding:12px;background:#F8F7FC;border-radius:9px;border:0.5px solid var(--border);}
.loc-checkboxes{display:flex;flex-direction:column;gap:7px;max-height:160px;overflow-y:auto;}
.loc-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;}
.loc-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--navy);}
/* Access scope display in user list */
.user-access{font-size:10px;color:var(--mist);margin-top:2px;}

/* Create form */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
label{font-size:11px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.04em;}
input,select{padding:10px 12px;border:0.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;background:#fff;color:var(--navy);}
input:focus,select:focus{outline:none;border-color:var(--navy);}
.btn-primary{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
.btn-primary:hover{opacity:.9;}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
.msg.success{background:var(--green-bg);color:var(--green);border:0.5px solid #B0D8C0;display:block;}
.msg.error{background:var(--red-bg);color:var(--red);border:0.5px solid #F0AAAA;display:block;}
.empty{color:var(--mist);font-size:12px;padding:12px 0;text-align:center;}
.nav{display:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="tb-title">Manage Users</div>
    <div class="tb-sub" id="tb-sub">Loading…</div>
  </div>
</div>
<div class="content">

  <!-- Create user -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Create new user</div>
    </div>
    <div class="card-body">
      <div id="msg" class="msg"></div>
      <div class="field">
        <label>Full name</label>
        <input id="new-name" type="text" placeholder="First name Last name…">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="new-email" type="email" placeholder="name@scout.vet">
      </div>
      <div class="field">
        <label>Temporary password</label>
        <input id="new-pass" type="text" value="MedSync2026!" autocomplete="off">
      </div>
      <div class="field">
        <label>Role</label>
        <select id="new-role"></select>
      </div>
      <div class="field" id="loc-field" style="display:none;">
        <label>Location</label>
        <select id="new-loc"></select>
      </div>
      <!-- Data Access Scope -->
      <div class="scope-section">
        <label>Data Access</label>
        <div class="scope-radios" id="scope-radios">
          <label class="scope-radio selected">
            <input type="radio" name="access-scope" value="all" checked onchange="onScopeChange()">
            <div>
              <div class="scope-radio-label">All locations</div>
              <div class="scope-radio-sub">Can see data across every location and region</div>
            </div>
          </label>
          <label class="scope-radio">
            <input type="radio" name="access-scope" value="region" onchange="onScopeChange()">
            <div>
              <div class="scope-radio-label">By region</div>
              <div class="scope-radio-sub">Sees all locations within one assigned region</div>
            </div>
          </label>
          <label class="scope-radio">
            <input type="radio" name="access-scope" value="locations" onchange="onScopeChange()">
            <div>
              <div class="scope-radio-label">Specific locations</div>
              <div class="scope-radio-sub">Sees only selected locations</div>
            </div>
          </label>
        </div>
        <div id="scope-region-field" class="scope-sub-field" style="display:none;">
          <label style="margin-bottom:6px;display:block;">Region</label>
          <select id="scope-region" style="margin:0;"></select>
        </div>
        <div id="scope-locations-field" class="scope-sub-field" style="display:none;">
          <label style="margin-bottom:6px;display:block;">Locations</label>
          <div class="loc-checkboxes" id="scope-loc-checkboxes"></div>
        </div>
      </div>
            <button class="btn-primary" onclick="createUser()">Create user →</button>
    </div>
  </div>

  <!-- Existing users -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Current users</div>
    </div>
    <div class="col-headers">
      <span class="col-label">Name</span>
      <span class="col-label center">Current Status</span>
      <span class="col-label center">Role</span>
      <span class="col-label center">Status Options</span>
    </div>
    <div id="user-list" style="padding:0 20px;">
      <div class="empty" style="padding:16px 0;">Loading…</div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://aemkdummdrmxtwrkggjw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbWtkdW1tZHJteHR3cmtnZ2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTQwNjEsImV4cCI6MjA5NTY3MDA2MX0.JzUojqfs9K6wOtrhjDnQ_knVU1wDvqR0MFH9z_r4G4s';
const _sess = (function(){ try { return JSON.parse(localStorage.getItem('medsync_session') || '{}'); } catch(e) { return {}; } })();
const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (_sess.access_token || SUPA_KEY), 'Content-Type': 'application/json' };

let _regions = [];
let _locations = [];

async function loadScopeData() {
  const [rRes, lRes] = await Promise.all([
    fetch(SUPA_URL + '/rest/v1/regions?select=id,name&order=name', { headers: H }),
    fetch(SUPA_URL + '/rest/v1/locations?select=id,name&order=name', { headers: H }),
  ]);
  _regions = await rRes.json();
  _locations = await lRes.json();

  // Populate region dropdown
  const rSel = document.getElementById('scope-region');
  if (Array.isArray(_regions)) {
    rSel.innerHTML = _regions.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  }

  // Populate location checkboxes
  const lBox = document.getElementById('scope-loc-checkboxes');
  if (Array.isArray(_locations)) {
    lBox.innerHTML = _locations.map(l =>
      `<label class="loc-check"><input type="checkbox" value="${l.id}"> ${l.name}</label>`
    ).join('');
  }
}

function onScopeChange() {
  const val = document.querySelector('input[name="access-scope"]:checked').value;
  document.getElementById('scope-region-field').style.display    = val === 'region'    ? 'block' : 'none';
  document.getElementById('scope-locations-field').style.display = val === 'locations' ? 'block' : 'none';
  // Update selected radio styling
  document.querySelectorAll('.scope-radio').forEach(el => {
    el.classList.toggle('selected', el.querySelector('input').checked);
  });
}

function getSelectedScope() {
  const scope = document.querySelector('input[name="access-scope"]:checked').value;
  let region_id = null;
  let location_ids = null;
  if (scope === 'region') {
    region_id = document.getElementById('scope-region').value || null;
  } else if (scope === 'locations') {
    const checked = [...document.querySelectorAll('#scope-loc-checkboxes input:checked')].map(i => i.value);
    location_ids = checked.length ? checked : null;
  }
  return { scope, region_id, location_ids };
}

function formatAccess(u) {
  const scope = u.access_scope || 'all';
  if (scope === 'all') return 'Access: all locations';
  if (scope === 'region') {
    const r = Array.isArray(_regions) ? _regions.find(r => r.id === u.access_region_id) : null;
    return 'Access: ' + (r ? r.name + ' region' : 'region');
  }
  if (scope === 'locations') {
    const ids = u.access_location_ids || [];
    const names = Array.isArray(_locations)
      ? ids.map(id => { const l = _locations.find(l => l.id === id); return l ? l.name : ''; }).filter(Boolean)
      : [];
    return 'Access: ' + (names.length ? names.join(', ') : 'specific locations');
  }
  return '';
}


let myRole = 'manager';
let myId   = null;
let _pendingDeleteId = null;

const ROLE_LABELS = {
  admin: 'Admin', manager: 'Manager', receiver: 'Receiver', inventory_lead: 'Inventory Lead',
  hospital_manager: 'Manager', clinical: 'Manager'  // legacy aliases
};
const CREATABLE = {
  admin:   ['admin','manager','receiver','inventory_lead'],
  manager: ['receiver','inventory_lead']
};
// Roles a given role can manage (activate/deactivate/delete)
const MANAGEABLE = {
  admin:   ['admin','manager','receiver','inventory_lead'],
  manager: ['receiver','inventory_lead']
};

async function boot() {
  try {
    const mu = JSON.parse(localStorage.getItem('medsync_user') || '{}');
    myRole = mu.role || 'manager';
    myId   = mu.id || null;
    document.getElementById('tb-sub').textContent = 'User Management · ' + (mu.full_name || '');

    const roleSel = document.getElementById('new-role');
    const allowed = CREATABLE[myRole] || CREATABLE['manager'];
    roleSel.innerHTML = allowed.map(r => `<option value="${r}">${ROLE_LABELS[r] || r}</option>`).join('');
    roleSel.addEventListener('change', onRoleChange);
    onRoleChange();

    await loadScopeData();
    const locSel = document.getElementById('new-loc');
    if (Array.isArray(_locations)) {
      locSel.innerHTML = _locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    }

    await loadUsers();
  } catch(e) { console.error(e); }
}

function onRoleChange() {
  const role = document.getElementById('new-role').value;
  document.getElementById('loc-field').style.display =
    ['manager','receiver','inventory_lead'].includes(role) ? 'block' : 'none';
}

async function loadUsers() {
  const res = await fetch(
    SUPA_URL + '/rest/v1/users?select=id,full_name,email,role,is_active,access_scope,access_region_id,access_location_ids&order=role,full_name',
    { headers: H }
  );
  const users = await res.json();
  const el = document.getElementById('user-list');
  if (!Array.isArray(users) || users.length === 0) {
    el.innerHTML = '<div class="empty">No users found.</div>';
    return;
  }

  const manageable = MANAGEABLE[myRole] || [];

  el.innerHTML = users.map(u => {
    const active   = u.is_active !== false;
    const canManage = manageable.includes(u.role) && u.id !== myId;
    const statusPill = active
      ? '<span class="status-pill sp-active">Active</span>'
      : '<span class="status-pill sp-inactive">Inactive</span>';

    let actionBtns = '';
    if (canManage) {
      const toggleBtn = active
        ? `<button class="action-btn btn-deactivate" data-id="${u.id}" onclick="deactivateUser('${u.id}','${u.full_name}')">Deactivate</button>`
        : `<button class="action-btn btn-activate"   data-id="${u.id}" onclick="activateUser('${u.id}','${u.full_name}')">Activate</button>`;
      const deleteBtn = `<button class="action-btn btn-delete" onclick="confirmDelete('${u.id}','${u.full_name}')">Delete</button>`;
      actionBtns = toggleBtn + deleteBtn;
    }

    return `
      <div class="user-row${active ? '' : ' inactive'}" id="row-${u.id}">
        <div class="user-info">
          <div class="user-name">${u.full_name || '—'}</div>
          <div class="user-email">${u.email || ''}</div>
          <div class="user-access">${formatAccess(u)}</div>
        </div>
        <div class="user-status-cell">${statusPill}</div>
        <div class="user-role-cell"><span class="role-badge rb-${u.role}">${ROLE_LABELS[u.role] || u.role}</span></div>
        <div class="user-actions-cell">${actionBtns}</div>
      </div>
      <div id="confirm-${u.id}" style="display:none;">
        <div class="confirm-row">
          <span class="confirm-text">Delete <strong>${u.full_name}</strong>? This cannot be undone.</span>
          <div class="confirm-actions">
            <button class="btn-cancel-del" onclick="cancelDelete('${u.id}')">Cancel</button>
            <button class="btn-confirm-del" onclick="deleteUser('${u.id}','${u.full_name}')">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function deactivateUser(id, name) {
  await fetch(SUPA_URL + '/rest/v1/users?id=eq.' + id, {
    method: 'PATCH', headers: H,
    body: JSON.stringify({ is_active: false })
  });
  showToast(name + ' deactivated');
  await loadUsers();
}

async function activateUser(id, name) {
  await fetch(SUPA_URL + '/rest/v1/users?id=eq.' + id, {
    method: 'PATCH', headers: H,
    body: JSON.stringify({ is_active: true })
  });
  showToast(name + ' reactivated');
  await loadUsers();
}

function confirmDelete(id, name) {
  // Hide any other open confirms first
  if (_pendingDeleteId && _pendingDeleteId !== id) {
    const prev = document.getElementById('confirm-' + _pendingDeleteId);
    if (prev) prev.style.display = 'none';
  }
  _pendingDeleteId = id;
  const el = document.getElementById('confirm-' + id);
  if (el) el.style.display = 'block';
}

function cancelDelete(id) {
  const el = document.getElementById('confirm-' + id);
  if (el) el.style.display = 'none';
  _pendingDeleteId = null;
}

async function deleteUser(id, name) {
  const res = await fetch(SUPA_URL + '/rest/v1/users?id=eq.' + id, {
    method: 'DELETE', headers: { ...H, 'Prefer': 'return=minimal' }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    showToast('Delete failed: ' + (err.message || err.hint || res.status), true);
    _pendingDeleteId = null;
    return;
  }
  showToast(name + ' deleted');
  _pendingDeleteId = null;
  await loadUsers();
}

async function createUser() {
  const name  = document.getElementById('new-name').value.trim();
  const email = document.getElementById('new-email').value.trim();
  const pass  = document.getElementById('new-pass').value.trim();
  const role  = document.getElementById('new-role').value;
  const scopeData = getSelectedScope();

  if (!name || !email || !pass) { showMsg('Please fill in all fields.', 'error'); return; }

  try {
    const signRes = await fetch(SUPA_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const signData = await signRes.json();
    const userId = signData.id || (signData.user && signData.user.id);
    if (!userId) {
      showMsg('Auth signup failed: ' + (signData.msg || signData.message || JSON.stringify(signData)), 'error');
      return;
    }

    const profileRes = await fetch(SUPA_URL + '/rest/v1/users', {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
          id: userId, email, full_name: name, role, is_active: true,
          access_scope:         scopeData.scope,
          access_region_id:     scopeData.region_id,
          access_location_ids:  scopeData.location_ids,
        })
    });
    if (!profileRes.ok) {
      const errBody = await profileRes.text();
      showMsg('Auth user created but profile insert failed: ' + errBody, 'error');
      return;
    }

    showMsg(name + ' created as ' + (ROLE_LABELS[role] || role) + '.', 'success');
    document.getElementById('new-name').value = '';
    document.getElementById('new-email').value = '';
    document.getElementById('new-pass').value = 'MedSync2026!';
    await loadUsers();
  } catch(e) { showMsg('Error: ' + e.message, 'error'); }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + type;
}

let _toastT = null;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#C0392B' : '';
  t.classList.add('show');
  if (_toastT) clearTimeout(_toastT);
  _toastT = setTimeout(() => { t.classList.remove('show'); t.style.background = ''; }, isError ? 4000 : 2800);
}

boot();
</script>
</body>
</html>
