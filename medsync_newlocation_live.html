<style>
:root{
  --navy:#1C2B4A;--gold:#C8922A;--green:#2E8B57;--red:#C0392B;
  --green-bg:#E8F5EE;--amber-bg:#FEF3E2;--red-bg:#FDECEA;--purple-bg:#EEE8F5;
  --mist:#8A93A8;--border:#DDD9EC;--surface:#FFFFFF;--bg:#F5F3FA;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:13px;min-height:100vh;}
.topbar{background:var(--navy);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-title{font-size:15px;font-weight:600;color:#fff;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.shell{max-width:860px;margin:0 auto;padding:28px 20px 48px;}

/* Step indicator */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px;}
.step{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--mist);}
.step.active{color:var(--navy);}
.step.done{color:var(--green);}
.step-num{width:24px;height:24px;border-radius:50%;background:#E4E0F0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mist);flex-shrink:0;}
.step.active .step-num{background:var(--navy);color:#fff;}
.step.done .step-num{background:var(--green);color:#fff;}
.step-line{flex:1;height:1px;background:var(--border);margin:0 10px;}

/* Cards */
.card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.card-sub{font-size:12px;color:var(--mist);margin-bottom:20px;}

/* Type selection tiles */
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.tile{border:1.5px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .15s;background:#fff;text-align:left;}
.tile:hover{border-color:#9B8EC4;background:#FAFAF8;}
.tile.selected{border-color:var(--navy);background:#F0EEF8;}
.tile-icon{font-size:28px;margin-bottom:8px;}
.tile-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.tile-desc{font-size:11px;color:var(--mist);line-height:1.4;}
.tile.selected .tile-desc{color:#5B4FA8;}

/* PIMS tiles */
.pims-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.pims-tile{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;background:#fff;display:flex;align-items:center;gap:12px;}
.pims-tile:hover{border-color:#9B8EC4;}
.pims-tile.selected{border-color:var(--navy);background:#F0EEF8;}
.pims-tile.disabled{opacity:.5;cursor:not-allowed;}
.pims-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.pims-name{font-size:13px;font-weight:600;}
.pims-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;background:#E8F5EE;color:var(--green);margin-top:2px;display:inline-block;}
.pims-badge.soon{background:#F0EEF8;color:var(--mist);}

/* Form fields */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{padding:10px 12px;border:0.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;background:#fff;color:var(--navy);}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Order preview table */
.order-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.order-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--border);background:#F8F7FC;}
.order-table td{padding:8px 10px;border-bottom:0.5px solid #F5F3FA;vertical-align:top;}
.order-table tr:last-child td{border-bottom:none;}
.cat-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;background:#E4E0F0;color:var(--navy);}
.qty-input{width:60px;padding:4px 6px;border:0.5px solid var(--border);border-radius:6px;font-size:12px;text-align:center;font-family:'DM Sans',sans-serif;}
.vetcove-price{color:#1C6FAD;font-weight:500;}
.tbd-price{color:var(--mist);font-style:italic;font-size:11px;}

/* Summary bar */
.summary-bar{background:var(--navy);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;color:#fff;}
.sum-item{text-align:center;}
.sum-val{font-size:18px;font-weight:600;}
.sum-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}

/* Buttons */
.btn-primary{padding:12px 24px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{padding:11px 20px;border:0.5px solid var(--border);background:#fff;color:var(--navy);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Success */
.success-card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:40px;text-align:center;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:600;margin-bottom:8px;}
.success-sub{font-size:13px;color:var(--mist);margin-bottom:24px;}
.success-actions{display:flex;gap:10px;justify-content:center;}

/* Alert */
.alert{background:var(--amber-bg);border:0.5px solid #E0C080;border-radius:8px;padding:10px 14px;font-size:12px;color:#A06020;margin-bottom:16px;}

/* API key input */
.api-field{position:relative;}
.api-field input{padding-right:80px;}
.api-field .test-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:5px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-ok{background:var(--green);}
.dot-err{background:var(--red);}
.dot-pend{background:var(--gold);}

.nav{display:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:14px;padding:24px;width:480px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
@media(max-width:768px){
  .shell{padding:16px 12px 40px;}
  .tile-grid{grid-template-columns:1fr;}
  .pims-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
  .btn-row{flex-direction:column;}
  .summary-bar{flex-wrap:wrap;gap:12px;}
}
</style>

  }
}

function stepBar(active) {
  const steps = state.locationType === 'denovo'
    ? ['Location type','Practice type & details','Review opening order']
    : ['Location type','Connect PIMS','Review & import'];
  return `<div class="steps">${steps.map((s,i) => {
    const cls = i < active ? 'done' : i === active ? 'active' : '';
    const num = i < active ? '✓' : i+1;
    return (i>0?'<div class="step-line"></div>':'')+
      `<div class="step ${cls}"><div class="step-num">${num}</div>${s}</div>`;
  }).join('')}</div>`;
}

// ── SCREEN 1: Type selection ───────────────────────────────────────────────
function renderTypeScreen() {
  return `
    ${stepBar(0)}
    <div class="card">
      <div class="card-title">What type of location are you opening?</div>
      <div class="card-sub">This determines how MedSync builds your opening inventory order.</div>
      <div class="tile-grid">
        <div class="tile ${state.locationType==='denovo'?'selected':''}" onclick="selectType('denovo')">
          <div class="tile-icon">🏗️</div>
          <div class="tile-name">De Novo (New Build)</div>
          <div class="tile-desc">Brand new location — MedSync generates a full minimum opening order based on your practice type, priced via Vetcove GPO.</div>
        </div>
        <div class="tile ${state.locationType==='existing'?'selected':''}" onclick="selectType('existing')">
          <div class="tile-icon">🔗</div>
          <div class="tile-name">Existing Practice</div>
          <div class="tile-desc">Acquiring or onboarding an existing clinic — connect your PIMS to automatically import current inventory and set min/max thresholds.</div>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="nextFromType()" ${!state.locationType?'disabled':''}>Continue →</button>
    </div>`;
}

function selectType(t) { state.locationType = t; render(); }

function nextFromType() {
  if (!state.locationType) return;
  state.screen = state.locationType === 'denovo' ? 'config' : 'existing';
  render();
}

// ── SCREEN 2a: De Novo config ──────────────────────────────────────────────
function renderConfigScreen() {
  return `
    ${stepBar(1)}
    <div class="card">
      <div class="card-title">Practice type</div>
      <div class="card-sub">Determines your minimum opening order and stocking quantities.</div>
      <div class="tile-grid">
        ${PRACTICE_TYPES.map(p => `
          <div class="tile ${state.practiceType===p.id?'selected':''}" onclick="selectPractice('${p.id}')">
            <div class="tile-icon">${p.icon}</div>
            <div class="tile-name">${p.name}</div>
            <div class="tile-desc">${p.desc}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Location details</div>
      <div class="card-sub">Basic info for your new location.</div>
      <div class="field-row">
        <div class="field"><label>Location name</label><input id="loc-name" type="text" placeholder="e.g. Naperville" value="${state.locationName}" oninput="state.locationName=this.value"></div>
        <div class="field"><label>Target open date</label><input id="open-date" type="date" value="${state.openDate}" oninput="state.openDate=this.value"></div>
      </div>
      <div class="field">
        <label>Address</label>
        <div style="position:relative;">
          <input id="loc-addr" type="text" placeholder="Start typing or use GPS…" value="${state.address}"
            oninput="state.address=this.value;addressAutocomplete(this.value)" autocomplete="off"
            style="padding-right:44px;">
          <button onclick="getGPSAddress()" title="Use my location" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:2px 4px;">📍</button>
        </div>
        <div id="addr-suggestions" style="position:relative;z-index:100;"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="state.screen='type';render()">← Back</button>
      <button class="btn-primary" onclick="buildOrder()">Build opening order →</button>
    </div>`;
}

function selectPractice(id) { state.practiceType = id; render(); }

function buildOrder() {
  if (!state.practiceType) { showToast('Please select a practice type'); return; }
  if (!state.locationName.trim()) { showToast('Please enter a location name'); return; }
  state.orderItems = (DENOVO_SETS[state.practiceType] || DENOVO_SETS.urgent_care).map(item => ({...item}));
  state.screen = 'order';
  render();
}

// ── SCREEN 3: Order review ─────────────────────────────────────────────────
function renderOrderScreen() {
  const items = state.orderItems;
  const cats = [...new Set(items.map(i => i.cat))];
  const totalItems = items.reduce((s,i) => s + i.qty, 0);

  return `
    ${stepBar(2)}
    <div class="summary-bar">
      <div class="sum-item"><div class="sum-val">${items.length}</div><div class="sum-lbl">Line items</div></div>
      <div class="sum-item"><div class="sum-val">${totalItems}</div><div class="sum-lbl">Total units</div></div>
      <div class="sum-item"><div class="sum-val">${cats.length}</div><div class="sum-lbl">Categories</div></div>
      <div class="sum-item"><div class="sum-val" style="color:#E8B84B;">TBD</div><div class="sum-lbl">Est. cost (Vetcove)</div></div>
    </div>
    <div class="alert">⚡ Unit pricing will auto-populate once your Vetcove API key is connected. Adjust quantities before submitting.</div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="order-table">
        <thead><tr><th>Product</th><th>SKU / Code</th><th>Category</th><th>Location</th><th style="text-align:center;">Qty</th><th>Unit Price</th></tr></thead>
        <tbody>
          ${cats.map(cat => {
            const catItems = items.filter(i => i.cat === cat);
            const color = CAT_COLORS[cat] || 'var(--navy)';
            return catItems.map((item, idx) => `
              <tr ${idx===0?`style="background:#FAFAF8;"`:''}>
                ${idx===0?`<td colspan="1" style="font-weight:600;font-size:11px;color:${color};padding-top:12px;">${cat}</td>`:
                  '<td></td>'}
              </tr>
              <tr>
                <td style="padding-left:16px;">${item.name}</td>
                <td style="font-family:monospace;font-size:10px;color:var(--mist);">${item.sku}</td>
                <td><span class="cat-badge" style="background:${color}20;color:${color};">${item.section}</span></td>
                <td style="color:var(--mist);font-size:11px;">${item.section}</td>
                <td style="text-align:center;"><input class="qty-input" type="number" min="0" value="${item.qty}" onchange="updateQty('${item.sku}',this.value)"></td>
                <td class="tbd-price">Via Vetcove</td>
              </tr>`).join('');
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="state.screen='config';render()">← Back</button>
      <button class="btn-secondary" onclick="exportOrder()">↓ Export CSV</button>
      <button class="btn-secondary" onclick="showAddItem()">+ Add item</button>
      <button class="btn-primary" onclick="submitOrder()">Submit to Vetcove →</button>
    </div>
    <div id="add-item-modal" style="display:none;">
      <div class="modal-bg" onclick="hideAddItem()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">Add item to order</div>
          <div class="field"><label>Product name</label><input id="ai-name" type="text" placeholder="e.g. Bravecto Plus for Cats"></div>
          <div class="field-row">
            <div class="field"><label>SKU / Vetcove code</label><input id="ai-sku" type="text" placeholder="e.g. 99-12345"></div>
            <div class="field"><label>Qty</label><input id="ai-qty" type="number" min="1" value="1"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Category</label>
              <select id="ai-cat">
                <option>Preventatives — Canine</option><option>Preventatives — Feline</option>
                <option>Vaccines</option><option>Diagnostics</option>
                <option>Antibiotics</option><option>Analgesia</option>
                <option>Controlled Substances</option><option>Injectables</option>
                <option>GI / Gastrointestinal</option><option>Dental</option>
                <option>Prescription Diets</option><option>Medical Equipment</option><option>Other</option>
              </select>
            </div>
            <div class="field"><label>Location / Area</label><input id="ai-loc" type="text" placeholder="e.g. Pharmacy"></div>
          </div>
          <div class="btn-row" style="margin-top:12px;">
            <button class="btn-secondary" onclick="hideAddItem()">Cancel</button>
            <button class="btn-primary" onclick="addCustomItem()">Add to order</button>
          </div>
        </div>
      </div>
    </div>`;
}

function updateQty(sku, val) {
  const item = state.orderItems.find(i => i.sku === sku);
  if (item) item.qty = parseInt(val) || 0;
}

function showAddItem() {
  document.getElementById('add-item-modal').style.display='block';
}
function hideAddItem() {
  document.getElementById('add-item-modal').style.display='none';
}
function addCustomItem() {
  var name = document.getElementById('ai-name').value.trim();
  var sku  = document.getElementById('ai-sku').value.trim();
  var qty  = parseInt(document.getElementById('ai-qty').value) || 1;
  var cat  = document.getElementById('ai-cat').value;
  var loc  = document.getElementById('ai-loc').value.trim() || 'Pharmacy';
  if (!name) { showToast('Please enter a product name'); return; }
  state.orderItems.push({cat:cat, name:name, sku:sku||'—', qty:qty, section:loc});
  hideAddItem();
  render();
}

function exportOrder() {
  const rows = [['Product','SKU','Category','Location','Qty','Unit Price']];
  state.orderItems.forEach(i => rows.push([i.name,i.sku,i.cat,i.section,i.qty,'TBD - Vetcove']));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'MedSync_DeNovo_Order_'+(state.locationName||'location')+'.csv';
  a.click();
}

async function submitOrder() {
  // Save location + order to Supabase
  try {
    const locRes = await fetch(SUPA_URL+'/rest/v1/locations', {
      method: 'POST',
      headers: {...H, 'Prefer': 'return=representation'},
      body: JSON.stringify({name: state.locationName, address: state.address})
    });
    const locData = await locRes.json();
    state.newLocationId = Array.isArray(locData) ? locData[0]?.id : locData?.id;
    state.screen = 'done';
    render();
  } catch(e) {
    // Even if save fails, show success for demo
    state.screen = 'done';
    render();
  }
}

// ── SCREEN 2b: Existing practice / PIMS connect ───────────────────────────
function renderExistingScreen() {
  return `
    ${stepBar(1)}
    <div class="card">
      <div class="card-title">Connect your practice management system</div>
      <div class="card-sub">MedSync will import your current inventory, set min/max thresholds, and sync order history.</div>
      <div class="pims-grid">
        <div class="pims-tile ${state.pimsType==='vetspire'?'selected':''}" onclick="selectPIMS('vetspire')">
          <div class="pims-logo" style="background:#1C6FAD;">VS</div>
          <div>
            <div class="pims-name">Vetspire</div>
            <span class="pims-badge">Connected</span>
          </div>
        </div>
        <div class="pims-tile disabled" title="Coming soon">
          <div class="pims-logo" style="background:#5B3FA8;">EZ</div>
          <div>
            <div class="pims-name">EzyVet</div>
            <span class="pims-badge soon">Coming soon</span>
          </div>
        </div>
        <div class="pims-tile disabled" title="Coming soon">
          <div class="pims-logo" style="background:#2E8B57;">CS</div>
          <div>
            <div class="pims-name">Cornerstone</div>
            <span class="pims-badge soon">Coming soon</span>
          </div>
        </div>
        <div class="pims-tile disabled" title="Coming soon">
          <div class="pims-logo" style="background:#C8922A;">AV</div>
          <div>
            <div class="pims-name">AVImark</div>
            <span class="pims-badge soon">Coming soon</span>
          </div>
        </div>
      </div>
    </div>
    ${state.pimsType === 'vetspire' ? `
    <div class="card">
      <div class="card-title">Vetspire API credentials</div>
      <div class="card-sub">Enter your Vetspire API key to import inventory and enable min/max sync.</div>
      <div class="field-row">
        <div class="field"><label>Location name</label><input type="text" placeholder="Practice name" value="${state.locationName}" oninput="state.locationName=this.value"></div>
        <div class="field"><label>Vetspire location ID</label><input type="text" placeholder="e.g. 23083" oninput="state.vetspireLocId=this.value"></div>
      </div>
      <div class="field">
        <label>API key</label>
        <div class="api-field">
          <input type="password" id="api-key-input" placeholder="Paste your Vetspire API key…" oninput="state.pimsApiKey=this.value">
          <button class="test-btn" onclick="testVetspire()">Test</button>
        </div>
      </div>
      <div id="connect-status" style="font-size:12px;margin-top:6px;display:none;"></div>
    </div>` : ''}
    <div class="btn-row">
      <button class="btn-secondary" onclick="state.screen='type';render()">← Back</button>
      <button class="btn-primary" onclick="connectPIMS()" ${!state.pimsType||!state.locationName||!state.pimsApiKey?'disabled':''}>Connect & import →</button>
    </div>`;
}

function selectPIMS(p) { state.pimsType = p; render(); }

async function testVetspire() {
  const status = document.getElementById('connect-status');
  status.style.display = 'block';
  status.innerHTML = '<span class="status-dot dot-pend"></span>Testing connection…';
  try {
    const res = await fetch('https://api.vetspire.com/graphql', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':state.pimsApiKey},
      body: JSON.stringify({query:'{ __typename }'})
    });
    if (res.ok) {
      status.innerHTML = '<span class="status-dot dot-ok"></span>Connected — Vetspire API responding';
      state.pimsConnected = true;
    } else {
      status.innerHTML = '<span class="status-dot dot-err"></span>Connection failed ('+res.status+') — check API key';
    }
  } catch(e) {
    status.innerHTML = '<span class="status-dot dot-err"></span>Could not reach Vetspire API — check network';
  }
  render();
}

async function connectPIMS() {
  state.screen = 'done';
  render();
}

// ── DONE ─────────────────────────────────────────────────────────────────
function renderDoneScreen() {
  const isDeNovo = state.locationType === 'denovo';
  return `
    <div class="success-card">
      <div class="success-icon">${isDeNovo ? '🏗️' : '🔗'}</div>
      <div class="success-title">${isDeNovo ? state.locationName+' is ready to order' : state.locationName+' connected'}</div>
      <div class="success-sub">${isDeNovo
        ? state.orderItems.length+' line items ready to submit to Vetcove. Unit pricing will populate once your Vetcove API key is active.'
        : 'Vetspire connected. Inventory import and min/max sync will complete within a few minutes.'
      }</div>
      <div class="success-actions">
        <button class="btn-secondary" onclick="startOver()">Set up another location</button>
        ${isDeNovo
          ? '<button class="btn-primary" onclick="exportOrder()">↓ Download CSV</button>'
          : '<button class="btn-primary" onclick="goToPortfolio()">View in Portfolio →</button>'
        }
      </div>
    </div>`;
}

function startOver() {
  state = {screen:'type',locationType:null,practiceType:null,pimsType:null,locationName:'',address:'',openDate:'',pimsApiKey:'',pimsConnected:false,orderItems:[]};
  render();
}

function goToPortfolio() {
  if (window.self !== window.top) window.parent.postMessage({type:'navigate',screen:'portfolio'},'*');
}


// ── Address autocomplete (OpenStreetMap Nominatim) ────────────────────────
var _addrTimer = null;
function addressAutocomplete(val) {
  clearTimeout(_addrTimer);
  var box = document.getElementById('addr-suggestions');
  if (!box) return;
  if (!val || val.length < 4) { box.innerHTML = ''; return; }
  _addrTimer = setTimeout(async function() {
    try {
      var res = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=5&q='+encodeURIComponent(val), {
        headers: {'Accept-Language': 'en-US', 'User-Agent': 'MedSync/1.0'}
      });
      var results = await res.json();
      if (!results.length) { box.innerHTML = ''; return; }
      var html = '<div id="addr-drop" style="position:absolute;left:0;right:0;top:100%;background:#fff;border:0.5px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;margin-top:2px;z-index:999;">';
      results.forEach(function(r) {
        var safe = r.display_name.replace(/"/g, '&quot;');
        html += '<div class="addr-opt" data-addr="' + safe + '" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:0.5px solid #F5F3FA;">' + r.display_name + '</div>';
      });
      html += '</div>';
      box.innerHTML = html;
      box.querySelectorAll('.addr-opt').forEach(function(el) {
        el.addEventListener('mouseenter', function(){ this.style.background='#F0EEF8'; });
        el.addEventListener('mouseleave', function(){ this.style.background=''; });
        el.addEventListener('click', function(){ selectAddress(this.dataset.addr); });
      });
    } catch(e) {}
  }, 350);
}

function selectAddress(addr) {
  state.address = addr;
  var inp = document.getElementById('loc-addr');
  if (inp) inp.value = addr;
  var box = document.getElementById('addr-suggestions');
  if (box) box.innerHTML = '';
}

function getGPSAddress() {
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  var inp = document.getElementById('loc-addr');
  if (inp) inp.placeholder = 'Getting location…';
  navigator.geolocation.getCurrentPosition(async function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    try {
      var res = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon, {
        headers: {'Accept-Language': 'en-US', 'User-Agent': 'MedSync/1.0'}
      });
      var data = await res.json();
      var addr = data.display_name || (lat.toFixed(5)+', '+lon.toFixed(5));
      selectAddress(addr);
      if (inp) inp.value = addr;
    } catch(e) {
      if (inp) inp.placeholder = '123 Main St, City, IL 60000';
    }
  }, function() {
    if (inp) inp.placeholder = '123 Main St, City, IL 60000';
    alert('Location access denied. Please enter address manually.');
  });
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C2B4A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2800);
}
render();
</script>
