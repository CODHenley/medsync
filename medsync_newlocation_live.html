<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSync · New Location Setup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1C2B4A;--gold:#C8922A;--green:#2E8B57;--red:#C0392B;
  --green-bg:#E8F5EE;--amber-bg:#FEF3E2;--red-bg:#FDECEA;--purple-bg:#E4DAF2;
  --mist:#8A93A8;--border:#B8B0D0;--surface:#FFFFFF;--bg:#EDE8F8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:13px;min-height:100vh;}
.topbar{background:var(--navy);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-home{display:flex;align-items:center;gap:7px;cursor:pointer;opacity:.8;flex-shrink:0;margin-right:4px;}
.tb-home:hover{opacity:1;}
.tb-home-label{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.tb-title{font-size:15px;font-weight:600;color:#fff;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.shell{max-width:860px;margin:0 auto;padding:28px 20px 48px;}

/* Step indicator */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px;}
.step{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--mist);}
.step.active{color:var(--navy);}
.step.done{color:var(--green);}
.step-num{width:24px;height:24px;border-radius:50%;background:#D8D0EC;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mist);flex-shrink:0;}
.step.active .step-num{background:var(--navy);color:#fff;}
.step.done .step-num{background:var(--green);color:#fff;}
.step-line{flex:1;height:1px;background:var(--border);margin:0 10px;}

/* Cards */
.card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.card-sub{font-size:12px;color:var(--mist);margin-bottom:20px;}

/* Type selection tiles */
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@keyframes tlPulse{0%,100%{box-shadow:0 0 0 0 rgba(28,43,74,.0);}50%{box-shadow:0 0 0 6px rgba(28,43,74,.15);}}
.tile-pulse{animation:tlPulse .7s ease 3;}
.tile{border:1.5px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .15s;background:#fff;text-align:left;}
.tile:hover{border-color:#9B8EC4;background:#FAFAF8;}
.tile.selected{border-color:var(--navy);background:#E8E2F6;}
.tile-icon{font-size:28px;margin-bottom:8px;}
.tile-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.tile-desc{font-size:11px;color:var(--mist);line-height:1.4;}
.tile.selected .tile-desc{color:#5B4FA8;}

/* PIMS tiles */
.pims-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.pims-tile{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;background:#fff;display:flex;align-items:center;gap:12px;}
.pims-tile:hover{border-color:#9B8EC4;}
.pims-tile.selected{border-color:var(--navy);background:#E8E2F6;}
.pims-tile.disabled{opacity:.5;cursor:not-allowed;}
.pims-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.pims-name{font-size:13px;font-weight:600;}
.pims-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;background:#E8F5EE;color:var(--green);margin-top:2px;display:inline-block;}
.pims-badge.soon{background:#E8E2F6;color:var(--mist);}

/* Form fields */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{padding:10px 12px;border:0.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;background:#fff;color:var(--navy);}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Order preview table */
.order-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.order-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--border);background:#F0EBF8;}
.order-table td{padding:8px 10px;border-bottom:0.5px solid #EDE8F8;vertical-align:top;}
.order-table tr:last-child td{border-bottom:none;}
.cat-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;background:#D8D0EC;color:var(--navy);}
.qty-input{width:60px;padding:4px 6px;border:0.5px solid var(--border);border-radius:6px;font-size:12px;text-align:center;font-family:'DM Sans',sans-serif;}
.vetcove-price{color:#1C6FAD;font-weight:500;}
.tbd-price{color:var(--mist);font-style:italic;font-size:11px;}
.filter-bar{display:flex;gap:8px;align-items:center;padding:10px 16px;background:#F0EBF8;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.filter-bar input{flex:1;min-width:160px;padding:7px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;}
.filter-bar select{padding:7px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--navy);}
.filter-count{font-size:11px;color:var(--mist);white-space:nowrap;}

/* Summary bar */
.summary-bar{background:var(--navy);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;color:#fff;}
.sum-item{text-align:center;}
.sum-val{font-size:18px;font-weight:600;}
.sum-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}

/* Buttons */
.btn-primary{padding:12px 24px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{padding:11px 20px;border:0.5px solid var(--border);background:#fff;color:var(--navy);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Success */
.success-card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:40px;text-align:center;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:600;margin-bottom:8px;}
.success-sub{font-size:13px;color:var(--mist);margin-bottom:24px;}
.success-actions{display:flex;gap:10px;justify-content:center;}

/* Alert */
.alert{background:var(--amber-bg);border:0.5px solid #E0C080;border-radius:8px;padding:10px 14px;font-size:12px;color:#A06020;margin-bottom:16px;}

/* API key input */
.api-field{position:relative;}
.api-field input{padding-right:80px;}
.api-field .test-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:5px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-ok{background:var(--green);}
.dot-err{background:var(--red);}
.dot-pend{background:var(--gold);}

.nav{display:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:14px;padding:24px;width:480px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
@media(max-width:768px){
  .shell{padding:16px 12px 40px;}
  .tile-grid{grid-template-columns:1fr;}
  .pims-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
  .btn-row{flex-direction:column;}
  .summary-bar{flex-wrap:wrap;gap:12px;}
}
</style>
</head>

function render() {
  const shell = document.getElementById('shell');
  switch(state.screen) {
    case 'type':    shell.innerHTML = renderTypeScreen(); break;
    case 'config':  shell.innerHTML = renderConfigScreen(); break;
    case 'order':   shell.innerHTML = renderOrderScreen(); break;
    case 'existing':shell.innerHTML = renderExistingScreen(); break;
    case 'done':    shell.innerHTML = renderDoneScreen(); break;
  }
}

function stepBar(active) {
  const steps = state.locationType === 'denovo'
    ? ['Location type','Practice type & details','Review opening order']
    : ['Location type','Connect PIMS','Review & import'];
  return `<div class="steps">${steps.map((s,i) => {
    const cls = i < active ? 'done' : i === active ? 'active' : '';
    const num = i < active ? '✓' : i+1;
    return (i>0?'<div class="step-line"></div>':'')+
      `<div class="step ${cls}"><div class="step-num">${num}</div>${s}</div>`;
  }).join('')}</div>`;
}

function renderTypeScreen() {
  return `
    ${stepBar(0)}
    <div class="card">
      <div class="card-title">What type of location are you opening?</div>
      <div class="card-sub">This determines how MedSync builds your opening inventory order.</div>
      <div class="tile-grid" id="loc-type-grid">

          <div class="tile-name">De Novo (New Build)</div>
          <div class="tile-desc">Brand new location — MedSync generates a full minimum opening order based on your practice type, priced via Vetcove GPO.</div>
        </div>
        <div class="tile ${state.locationType==='existing'?'selected':''}" onclick="selectType('existing')">
          <div class="tile-icon">🔗</div>
          <div class="tile-name">Existing Practice</div>
          <div class="tile-desc">Acquiring or onboarding an existing clinic — connect your PIMS to automatically import current inventory and set min/max thresholds.</div>

        ${(function(){
          if (!planInfo) return '';
          var unlimited = planInfo.limit === 999;
          var remaining = unlimited ? null : planInfo.limit - planInfo.count;
          var pct = unlimited ? 0 : planInfo.count / planInfo.limit;
          var color = unlimited ? '#0F6E56' : pct >= 1 ? '#a33030' : pct >= 0.8 ? '#a0700a' : '#0F6E56';
          var bg    = unlimited ? '#E1F5EE' : pct >= 1 ? '#fde0d0' : pct >= 0.8 ? '#fdefc7' : '#E1F5EE';
          var bdr   = unlimited ? '#b0ddd0' : pct >= 1 ? '#f0a0a0' : pct >= 0.8 ? '#f0d070' : '#b0ddd0';
          var usageText = unlimited ? 'Unlimited locations' : remaining + ' of ' + planInfo.limit + ' slots remaining';
          var warn = (!unlimited && remaining === 0) ? '<div style="font-size:10px;margin-top:6px;color:'+color+';font-weight:600;">No slots available — contact Scout to upgrade</div>' :
                     (!unlimited && remaining === 1) ? '<div style="font-size:10px;margin-top:6px;color:'+color+';font-weight:600;">⚠ Last available slot</div>' : '';
          var bar = unlimited ? '' : '<div style="background:#e0e0e0;border-radius:4px;height:5px;margin-top:10px;overflow:hidden;"><div style="background:'+color+';height:5px;width:'+(planInfo.count/planInfo.limit*100)+'%;border-radius:4px;"></div></div>';
          return '<div class="tile" style="background:'+bg+';border-color:'+bdr+';cursor:pointer;" onclick="showPlanModal()">'
            +'<div class="tile-icon">📋</div>'
            +'<div class="tile-name" style="color:'+color+';">Your Plan</div>'
            +'<div style="margin-top:4px;"><span style="background:'+color+';color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;">'+planInfo.label+'</span></div>'
            +'<div style="font-size:12px;margin-top:8px;color:'+color+';">'+usageText+'</div>'
            +bar+warn
            +'</div>';
        })()}
      </div>
    </div>
    <div style="margin:18px 0 4px;">
      <div style="font-size:11px;font-weight:700;color:#1C2B4A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">What type of practice is this location?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${['urgent_care','er','specialty','general'].map(t => {
          const labels = {urgent_care:'🚨 Urgent Care',er:'🏥 Emergency (ER)',specialty:'🔬 Specialty',general:'🐾 General Practice'};
          const sel = state.practiceType === t;
          return `<div onclick="selectPracticeType('${t}')" style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid ${sel?'#1C2B4A':'#B8B0D0'};border-radius:9px;cursor:pointer;font-size:12px;font-weight:${sel?700:500};background:${sel?'#E8F0FE':'#fff'};color:${sel?'#1C2B4A':'#4A5568'};transition:all .15s;">${labels[t]}</div>`;

      ${!state.practiceType ? '<div style="font-size:10px;color:#a0700a;margin-top:6px;">Select a practice type to continue</div>' : ''}

function selectType(t) { state.locationType = t; render(); }
function selectPracticeType(t) { state.practiceType = t; render(); }

function nextFromType() {
  if (!state.locationType) return;
  state.screen = state.locationType === 'denovo' ? 'config' : 'existing';
  loadRegions().then(render);
}

async function loadRegions() {
  try {
    var r = await fetch(SUPA_URL+'/rest/v1/regions?select=id,name&order=name', {headers:H});
    var data = await r.json();
    if (Array.isArray(data)) { state.regions = data; }
  } catch(e) { state.regions = []; }
}

function selectPractice(id) { state.practiceType = id; render(); }

function onRegionChange(val) {
  if (val === '__new__') {
    state.createNewRegion = true;
    state.regionId = null;
    state.regionName = '';
  } else {
    state.createNewRegion = false;
    state.regionId = val || null;
    var reg = state.regions.find(function(r){ return r.id === val; });
    state.regionName = reg ? reg.name : '';
  }
  render();
}

function buildOrder() {
  if (!state.practiceType) { showToast('Please select a practice type'); return; }
  if (!state.locationName.trim()) { showToast('Please enter a location name'); return; }
  state.orderItems = (DENOVO_SETS[state.practiceType] || DENOVO_SETS.urgent_care).map(item => ({...item}));
  state.screen = 'order';
  render();
}

function renderOrderScreen() {
  const allItems = state.orderItems;
  const fSearch = (state.orderFilter||'').toLowerCase();
  const fCat = state.orderCat||'all';
  const items = allItems.filter(function(i){
    var matchSearch = !fSearch || i.name.toLowerCase().includes(fSearch) || (i.sku||'').toLowerCase().includes(fSearch);
    var matchCat = fCat==='all' || i.cat===fCat;
    return matchSearch && matchCat;
  });
  const allCats = [...new Set(allItems.map(i => i.cat))];
  const cats = [...new Set(items.map(i => i.cat))];
  const totalItems = allItems.reduce((s,i) => s + i.qty, 0);

  return `
    ${stepBar(2)}
    <div class="summary-bar">
      <div class="sum-item"><div class="sum-val">${items.length}</div><div class="sum-lbl">Line items</div></div>
      <div class="sum-item"><div class="sum-val">${totalItems}</div><div class="sum-lbl">Total units</div></div>
      <div class="sum-item"><div class="sum-val">${cats.length}</div><div class="sum-lbl">Categories</div></div>
      <div class="sum-item"><div class="sum-val" style="color:#E8B84B;">TBD</div><div class="sum-lbl">Est. cost (Vetcove)</div></div>
    </div>
    <div class="alert">⚡ Unit pricing shown is GPO-estimated. Adjust quantities, then export a PDF to place with Vetcove or your distributor rep.</div>

function updateQty(sku, val) {
  const item = state.orderItems.find(i => i.sku === sku);
  if (item) item.qty = parseInt(val) || 0;
}

function showAddItem() {
  document.getElementById('add-item-modal').style.display='block';
}
function hideAddItem() {
  document.getElementById('add-item-modal').style.display='none';
}
function addCustomItem() {
  var name = document.getElementById('ai-name').value.trim();
  var sku  = document.getElementById('ai-sku').value.trim();
  var qty  = parseInt(document.getElementById('ai-qty').value) || 1;
  var cat  = document.getElementById('ai-cat').value;
  var loc  = document.getElementById('ai-loc').value.trim() || 'Pharmacy';
  if (!name) { showToast('Please enter a product name'); return; }
  state.orderItems.push({cat:cat, name:name, sku:sku||'—', qty:qty, section:loc});
  hideAddItem();
  render();

function exportOrder() {
  const rows = [['Product','SKU','Category','Location','Qty','Unit Price']];
  state.orderItems.forEach(i => rows.push([i.name,i.sku,i.cat,i.section,i.qty,'TBD - Vetcove']));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'MedSync_DeNovo_Order_'+(state.locationName||'location')+'.csv';
  a.click();
}

async function submitOrder() {
  try {
    // Create region if new
    var regionId = state.regionId;
    if (state.createNewRegion && state.regionName.trim()) {
      var rr = await fetch(SUPA_URL+'/rest/v1/regions', {
        method:'POST', headers:{...H,'Prefer':'return=representation'},
        body: JSON.stringify({name: state.regionName.trim()})
      });
      var rd = await rr.json();
      regionId = Array.isArray(rd) ? rd[0]?.id : rd?.id;
    }
    // Save location
    var payload = {name: state.locationName, address: state.address, practice_type: state.practiceType || null};
    if (regionId) payload.region_id = regionId;
    var locRes = await fetch(SUPA_URL+'/rest/v1/locations', {
      method:'POST', headers:{...H,'Prefer':'return=representation'},
      body: JSON.stringify(payload)
    });
    var locData = await locRes.json();
    state.newLocationId = Array.isArray(locData) ? locData[0]?.id : locData?.id;
    state.newRegionName = state.regionName || (state.regions.find(function(r){return r.id===regionId;})||{}).name || '';
    state.screen = 'done';
    render();
  } catch(e) {
    showToast('Save failed: ' + e.message);
    console.error(e);
  }
}

var _addrTimer = null;
function addressAutocomplete(val) {
  clearTimeout(_addrTimer);
  var box = document.getElementById('addr-suggestions');
  if (!box) return;
  if (!val || val.length < 4) { box.innerHTML = ''; return; }
  _addrTimer = setTimeout(async function() {
    try {
      var res = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=5&q='+encodeURIComponent(val), {
        headers: {'Accept-Language': 'en-US', 'User-Agent': 'MedSync/1.0'}
      });
      var results = await res.json();
      if (!results.length) { box.innerHTML = ''; return; }
      var html = '<div id="addr-drop" style="position:absolute;left:0;right:0;top:100%;background:#fff;border:0.5px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;margin-top:2px;z-index:999;">';
      results.forEach(function(r) {
        var safe = r.display_name.replace(/"/g, '&quot;');
        html += '<div class="addr-opt" data-addr="' + safe + '" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:0.5px solid #EDE8F8;">' + r.display_name + '</div>';
      });
      html += '</div>';
      box.innerHTML = html;
      box.querySelectorAll('.addr-opt').forEach(function(el) {
        el.addEventListener('mouseenter', function(){ this.style.background='#E8E2F6'; });
        el.addEventListener('mouseleave', function(){ this.style.background=''; });
        el.addEventListener('click', function(){ selectAddress(this.dataset.addr); });
      });
    } catch(e) {}
  }, 350);
}

function selectAddress(addr) {
  state.address = addr;
  var inp = document.getElementById('loc-addr');
  if (inp) inp.value = addr;
  var box = document.getElementById('addr-suggestions');
  if (box) box.innerHTML = '';
}

function getGPSAddress() {
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  var inp = document.getElementById('loc-addr');
  if (inp) inp.placeholder = 'Getting location…';
  navigator.geolocation.getCurrentPosition(async function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    try {
      var res = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon, {
        headers: {'Accept-Language': 'en-US', 'User-Agent': 'MedSync/1.0'}
      });
      var data = await res.json();
      var addr = data.display_name || (lat.toFixed(5)+', '+lon.toFixed(5));
      selectAddress(addr);
      if (inp) inp.value = addr;
    } catch(e) {
      if (inp) inp.placeholder = '123 Main St, City, IL 60000';
    }
  }, function() {
    if (inp) inp.placeholder = '123 Main St, City, IL 60000';
    alert('Location access denied. Please enter address manually.');
  });
}

    // Gather email from every source — including JWT payload as last resort
    let userEmail = _sess.user?.email || _sess.email || _mu2.email;
    if (!userEmail && _sess.access_token) {
      try { userEmail = JSON.parse(atob(_sess.access_token.split('.')[1])).email; } catch(e) {}
    }
    userEmail = (userEmail || '').trim().toLowerCase();

    const accessToken = _sess.access_token || SUPA_KEY;
    const Hauth = {'apikey':SUPA_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'};
    // Anon headers: orgs table only has anon_all RLS — user JWT returns [] without authenticated role policy
    const Hanon = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

    // 0. Fast path: @scoutcare.com — skip network lookups, go straight to known org
    let orgId = null;
    if (userEmail.endsWith('@scoutcare.com') || userEmail.endsWith('@medsync.vet')) {
      orgId = 'ce27c4f4-7352-4128-86ff-b1891b50933c';
    }

    // 1. Stored at login
    if (!orgId) orgId = _mu2.organization_id || null;

    // 2. Lookup by contact_email (anon first — works with anon_all policy)
    if (!orgId && userEmail) {
      for (const hdrs of [Hanon, Hauth]) {
        const r = await fetch(SUPA_URL + `/rest/v1/organizations?select=id&contact_email=eq.${encodeURIComponent(userEmail)}`, { headers: hdrs });
        const d = await r.json();
        orgId = Array.isArray(d) && d[0] ? d[0].id : null;
        if (orgId) break;
      }
    }

    // 3. Users table by id or email
    if (!orgId) {
      const userId = _sess.user?.id || _sess.user_id || _jwtSub(_sess.access_token);
      for (const hdrs of [Hanon, Hauth]) {
        if (!orgId && userId) {
          const r = await fetch(SUPA_URL + `/rest/v1/users?select=organization_id&id=eq.${userId}`, { headers: hdrs });
          const d = await r.json();
          orgId = Array.isArray(d) && d[0] ? d[0].organization_id : null;
        }
        if (!orgId && userEmail) {
          const r = await fetch(SUPA_URL + `/rest/v1/users?select=organization_id&email=eq.${encodeURIComponent(userEmail)}`, { headers: hdrs });
          const d = await r.json();
          orgId = Array.isArray(d) && d[0] ? d[0].organization_id : null;
        }
        if (orgId) break;
      }
    }

    if (!orgId) { planInfo = { tier: 'internal', count: 0, limit: 999, label: 'Internal' }; render(); return; }
    _orgIdCache = orgId;

    // Use anon headers for final fetch — orgs table has anon_all policy, not authenticated policy
    const [orgRes, locRes] = await Promise.all([
      fetch(SUPA_URL + `/rest/v1/organizations?select=name,tier,location_limit,contact_email,contact_name&id=eq.${orgId}`, { headers: Hanon }),
      fetch(SUPA_URL + `/rest/v1/locations?select=id&organization_id=eq.${orgId}`, { headers: Hanon }),
    ]);
    const orgs = await orgRes.json();
    const locs = await locRes.json();
    // If API fetch fails but orgId is known, use hardcoded fallback
    if (!Array.isArray(orgs) || !orgs[0]) {
      if (orgId === 'ce27c4f4-7352-4128-86ff-b1891b50933c') {
        const count = (Array.isArray(locs) && locs.length > 0) ? locs.length : 4;
        planInfo = { tier: 'mid_group', count, limit: 6, label: 'Mid Group' };
        render();
        const topbarSub = document.querySelector('.tb-sub');
        if (topbarSub) topbarSub.innerHTML = `Mid Group plan &nbsp;·&nbsp; <span style="color:rgba(255,255,255,.5)">${count} / 6 locations used</span>`;
        return;
      }
      render(); return;
    }

    const org   = orgs[0];
    const limit = org.location_limit;
    const count = Array.isArray(locs) ? locs.length : 0;
    const TIER_LABELS = { solo:'Solo',small_group:'Small Group',mid_group:'Mid Group',large_group:'Large Group',enterprise:'Enterprise',internal:'Internal' };

    // Store for banner use in render()
    planInfo = { tier: org.tier, count, limit, label: TIER_LABELS[org.tier] || org.tier };

    // Inject limit bar into topbar area
    const topbarSub = document.querySelector('.tb-sub');
    if (topbarSub) {
      const pct = limit === 999 ? 0 : Math.min((count / limit) * 100, 100);
      topbarSub.innerHTML = `${TIER_LABELS[org.tier]||org.tier} plan &nbsp;·&nbsp; <span style="color:${pct>=100?'#f0a0a0':pct>=80?'#E8B84B':'rgba(255,255,255,.5)'}">${count} / ${limit===999?'∞':limit} locations used</span>`;
    }

    // Check for post-payment return
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('upgraded') === '1') {
      document.getElementById('upgrade-banner').innerHTML = `
        <div style="max-width:860px;margin:16px auto 0;padding:0 20px;">
          <div style="background:#E8F5EE;border:0.5px solid #a0d8b0;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;">
            <span style="font-size:18px;">✅</span>
            <div style="flex:1;font-size:13px;color:#1a5c35;font-weight:500;">Plan upgraded successfully! Your new location slots are now available.</div>
            <button onclick="this.closest('div[style]').parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#8A93A8;font-size:16px;">×</button>
          </div>
        </div>`;
      window.history.replaceState({}, '', window.location.pathname);
    }

    if (count >= limit && limit !== 999) {
      document.getElementById('shell').innerHTML = `
        <div style="background:#FDECEA;border:0.5px solid #f0a0a0;border-radius:14px;padding:36px;text-align:center;max-width:520px;margin:40px auto;">
          <div style="font-size:36px;margin-bottom:12px;">🔒</div>
          <div style="font-size:16px;font-weight:600;color:#a33030;margin-bottom:8px;">Location limit reached</div>
          <div style="font-size:12px;color:#a33030;line-height:1.7;margin-bottom:20px;">
            Your <strong>${TIER_LABELS[org.tier]||org.tier}</strong> plan allows up to <strong>${limit} location${limit===1?'':'s'}</strong>.<br>
            You've used all ${limit} slot${limit===1?'':'s'}.
          </div>
          <button onclick="openUpgradeModal('${org.tier}','${orgId}')" style="background:#1C2B4A;color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:13px;font-weight:700;cursor:pointer;">Upgrade MedSync Package →</button>
        </div>`;
      return;
    }

    // Warning banner at 2 slots remaining
    if (limit !== 999 && (limit - count) <= 2) {
      document.getElementById('upgrade-banner').innerHTML = `
        <div style="max-width:860px;margin:16px auto 0;padding:0 20px;">
          <div style="background:#FEF3E2;border:0.5px solid #f0c060;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;">
            <span style="font-size:18px;">⚠️</span>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;color:#7a4a00;">Only ${limit - count} location slot${limit-count===1?'':'s'} remaining</div>
              <div style="font-size:11px;color:#a06020;margin-top:2px;">You're on the <strong>${TIER_LABELS[org.tier]||org.tier}</strong> plan (${count} of ${limit} locations used). Upgrade to add more.</div>
            </div>
            <button onclick="openUpgradeModal('${org.tier}','${orgId}')" style="background:#1C2B4A;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">Upgrade Package</button>
          </div>
        </div>`;
      // Send one-time notification email to org admin
      const nudgeKey = 'medsync_upgrade_nudge_' + orgId;
      if (!localStorage.getItem(nudgeKey) && (org.contact_email || userEmail)) {
        const adminEmail = org.contact_email || userEmail;
        const adminName  = org.contact_name || adminEmail;
        sendUpgradeNudgeEmail(adminName, adminEmail, org.name, TIER_LABELS[org.tier]||org.tier, limit - count);
        localStorage.setItem(nudgeKey, '1');
      }
    }

    render();
  } catch(e) {
    render(); // Non-fatal — proceed without limit check
  }
}

// ── Upgrade modal ─────────────────────────────────────────────────────────

let _upgradeOrgId = null;

const TIER_ORDER = ['solo','small_group','mid_group','large_group','enterprise'];

function openUpgradeModal(currentTier, orgId) {

  _upgradeOrgId = orgId;

  const TIER_LABELS = { solo:'Solo',small_group:'Small Group',mid_group:'Mid Group',large_group:'Large Group',enterprise:'Enterprise' };
  const currentDef = { solo:{limit:1,monthly:149}, small_group:{limit:3,monthly:249}, mid_group:{limit:6,monthly:349}, large_group:{limit:12,monthly:449}, enterprise:{limit:999,monthly:499} }[currentTier] || {limit:0,monthly:0};

  const tiersHtml = `
    <div style="background:#F0EBF8;border-radius:10px;padding:14px 16px;margin-bottom:4px;border:2px solid #B8B0D0;opacity:.7;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-size:11px;font-weight:700;background:#1C2B4A;color:#fff;padding:2px 8px;border-radius:10px;margin-right:8px;">CURRENT</span>
          <span style="font-size:14px;font-weight:600;color:#1C2B4A;">${TIER_LABELS[currentTier]||currentTier}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-size:15px;font-weight:700;color:#1C2B4A;">$${currentDef.monthly}<span style="font-size:11px;font-weight:400;color:#8A93A8;">/mo</span></div>
          <div style="font-size:11px;color:#8A93A8;">${currentDef.limit === 999 ? 'Unlimited' : 'Up to ' + currentDef.limit} location${currentDef.limit===1?'':'s'}</div>
        </div>
      </div>
    </div>
    ${available.map(t => `
    <div id="upgrade-opt-${t.key}" onclick="selectUpgradeTier('${t.key}')" style="border:2px solid #B8B0D0;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:14px;font-weight:600;color:#1C2B4A;">${t.label}</div>
          <div style="font-size:11px;color:#8A93A8;margin-top:2px;">${t.limit === 999 ? 'Unlimited locations' : 'Up to ' + t.limit + ' locations'}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:15px;font-weight:700;color:#1C2B4A;">$${t.monthly}<span style="font-size:11px;font-weight:400;color:#8A93A8;">/mo</span></div>
          <div style="font-size:11px;color:#2E8B57;">+${t.limit===999?'∞':t.limit - currentDef.limit} more slot${t.limit-currentDef.limit===1?'':'s'}</div>
        </div>
      </div>
    </div>`).join('')}`;

  document.getElementById('upgrade-tiers').innerHTML = tiersHtml;
  document.getElementById('upgrade-cta').disabled = true;
  document.getElementById('upgrade-cta').style.opacity = '.4';
  document.getElementById('upgrade-cta').textContent = 'Select a plan above';
  document.getElementById('upgrade-error').style.display = 'none';
  document.getElementById('upgrade-modal').style.display = 'flex';
}

function closeUpgradeModal() {
  document.getElementById('upgrade-modal').style.display = 'none';
}

function selectUpgradeTier(key) {
  _upgradeTier = key;
  document.querySelectorAll('[id^="upgrade-opt-"]').forEach(el => {
    el.style.borderColor = '#B8B0D0';
    el.style.background = '#fff';
  });
  const sel = document.getElementById('upgrade-opt-' + key);
  if (sel) { sel.style.borderColor = '#1C2B4A'; sel.style.background = '#E8E2F6'; }
  const tier = UPGRADE_TIERS.find(t => t.key === key);
  const btn = document.getElementById('upgrade-cta');
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.textContent = `Upgrade to ${tier.label} — $${tier.monthly}/mo →`;
}

async function startCheckout() {
  const tier = UPGRADE_TIERS.find(t => t.key === _upgradeTier);
  if (!tier || !_upgradeOrgId) return;
  const btn = document.getElementById('upgrade-cta');
  btn.disabled = true;
  btn.textContent = 'Redirecting to payment…';
  document.getElementById('upgrade-error').style.display = 'none';
  try {
    const r = await fetch(EDGE_URL + '/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
      body: JSON.stringify({
        org_id:      _upgradeOrgId,
        new_tier:    tier.key,
        price_id:    tier.priceId,
        success_url: window.location.origin + '/medsync_newlocation_live.html?upgraded=1',
        cancel_url:  window.location.href,
      })
    });
    const data = await r.json();
    if (!r.ok || !data.url) throw new Error(data.error || 'Could not create checkout session');
    window.location.href = data.url;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = `Upgrade to ${tier.label} — $${tier.monthly}/mo →`;
    const errEl = document.getElementById('upgrade-error');
    errEl.textContent = 'Payment setup failed: ' + e.message;
    errEl.style.display = 'block';
  }
}

function navHome() {
  if (window.self !== window.top) {
    window.parent.postMessage({ type: 'navigate', screen: 'portfolio' }, '*');
  } else {
    window.location.href = 'medsync_portfolio_live.html';
  }
}
