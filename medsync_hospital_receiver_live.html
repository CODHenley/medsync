<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSync — Hospital Receiver</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B4A;--gold:#C8922A;--gold-light:#E8B84B;
  --slate:#4A5568;--mist:#8899AA;--border:#DDD9EC;
  --bg:#fff;--surface:#fff;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --amber:#a0700a;--amber-bg:#fdefc7;--amber-border:#f0d070;
  --red:#a33030;--red-bg:#fde0d0;
}
body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--navy);font-size:13px;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;margin:0!important;padding:0!important;}

.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px;}

/* Header */
.header{text-align:center;padding:8px 0;}
.header-title{font-size:22px;font-weight:600;}
.header-sub{font-size:13px;color:var(--mist);margin-top:4px;}

/* Cards */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:14px;}
.card-label{font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.06em;}

/* Name entry */
.name-input{padding:12px 14px;border:0.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:none;width:100%;}
.name-input:focus{border-color:var(--navy);}

/* Task buttons */
.task-btn{padding:16px;border:0.5px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .12s;text-align:left;width:100%;font-family:'DM Sans',sans-serif;}
.task-btn:hover{background:#F0EEF8;border-color:var(--navy);}
.task-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.task-title{font-size:14px;font-weight:600;color:var(--navy);}
.task-sub{font-size:11px;color:var(--mist);margin-top:2px;}

/* Scan area */
.scan-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;}
.scan-head{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.scan-head-title{font-size:13px;font-weight:500;color:#fff;}
.scan-head-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.scan-progress{font-size:11px;color:rgba(255,255,255,.7);}
.scan-body{padding:16px;}
.scan-last{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
.scan-last.ok{background:var(--green-bg);color:var(--green);}
.scan-last.warn{background:var(--amber-bg);color:var(--amber);}
.scan-input-wrap{display:flex;gap:8px;}
.scan-input{flex:1;padding:11px 14px;border:0.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Mono',monospace;outline:none;}
.scan-input:focus{border-color:var(--navy);}
.btn-scan{padding:11px 18px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.scan-items{margin-top:12px;display:flex;flex-direction:column;gap:4px;}
.scan-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;font-size:12px;}
.scan-item.confirmed{background:var(--green-bg);}
.scan-item.pending{background:#F5F3FA;}
.si-name{font-weight:500;}
.si-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.b-ok{background:var(--green-bg);color:var(--green);}
.b-pend{color:var(--mist);}

/* Buttons */
.btn-primary{padding:13px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background .12s;}
.btn-primary:hover{background:#243459;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{padding:11px;background:var(--surface);color:var(--navy);border:0.5px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-secondary:hover{background:#F0EEF8;}

/* Success */
.success-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:32px 22px;text-align:center;}
.success-icon{font-size:52px;margin-bottom:12px;}
.success-title{font-size:20px;font-weight:600;margin-bottom:6px;}
.success-sub{font-size:13px;color:var(--mist);margin-bottom:20px;line-height:1.6;}

/* Location select */
select.loc-sel{padding:11px 14px;border:0.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--navy);background:var(--surface);outline:none;width:100%;}
select.loc-sel:focus{border-color:var(--navy);}

#toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s;z-index:300;}

/* ── Mobile optimization ─────────────────────────────────────── */



@media (max-width: 768px) {
  html, body { overflow-x: hidden !important; }
  body { justify-content: flex-start !important; padding-top: 16px !important; }
  .shell { max-width: 100% !important; }
  input, select { font-size: 16px !important; }
}

/* ══ IFRAME LAYOUT — nav and sidebar handled by parent app ══════
   Hide internal nav and sidebar on ALL screen sizes.
   Content fills full iframe width, matching portfolio behavior.
══════════════════════════════════════════════════════════════ */
.outer { margin-top: 0 !important; padding-top: 0 !important; }
html, body { margin: 0 !important; padding: 0 !important; }
.topbar { padding-top: 0 !important; }
.nav { display:none!important;height:0!important;overflow:hidden!important;visibility:hidden!important;position:absolute!important; }
.sidebar { display: none !important; }
.outer { grid-template-columns: 1fr !important; }
.right, .main-area { height: 100% !important; overflow: hidden !important; }



/* ── Fit iframe exactly — no gap ────────────────────────────── */
@media (max-width: 768px) {
  html { height: auto !important; overflow: auto !important; overflow-x: hidden !important; }
  body { height: auto !important; overflow: auto !important; overflow-x: hidden !important; min-height: 100% !important; }
  .right, .main-area { height: auto !important; overflow: visible !important; }
}

@media (min-width: 769px) {
  html { height: 100%; overflow: hidden; }
  body { height: 100%; overflow: hidden; min-height: 0 !important; }
}
@media (max-width: 768px) {
  .outer, .main-area, .content, .topbar { max-width: 100% !important; overflow-x: hidden !important; }
  .tb-left, .tb-right { max-width: 100% !important; flex-shrink: 1 !important; }
}

@media (max-width: 768px) {
  * { box-sizing: border-box !important; }
  html, body { overflow-x: hidden !important; max-width: 100vw !important; height: auto !important; overflow-y: auto !important; }
  body { padding-top: 8px !important; }
  .shell { max-width: 100% !important; padding: 0 12px !important; }
}

/* mobile nav offset handled by parent (margin-top on #ms-receiver) */
@media (max-width: 768px) {
  .scan-input-wrap { gap: 6px !important; }
  .btn-scan { padding: 10px 12px !important; font-size: 12px !important; min-width: 0 !important; }
}
</style>
</head>
<body>

<div class="shell" id="app"></div>
<div id="toast"></div>

<script>
const SUPA_URL = 'https://aemkdummdrmxtwrkggjw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbWtkdW1tZHJteHR3cmtnZ2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTQwNjEsImV4cCI6MjA5NTY3MDA2MX0.JzUojqfs9K6wOtrhjDnQ_knVU1wDvqR0MFH9z_r4G4s';
const _sess = (function(){ try { return JSON.parse(localStorage.getItem('medsync_session') || '{}'); } catch(e) { return {}; } })();
const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (_sess.access_token || SUPA_KEY), 'Content-Type': 'application/json' };

let state = {
  screen: 'welcome', // welcome | task | receive | goods | done
  name: '',
  locationId: null,
  locationName: null,
  task: null,
  locations: [],
  orders: [],
  selectedOrder: null,
  lines: [],
  scannedCount: 0,
};

async function boot() {
  // mobile nav offset handled by parent index.html
  const res = await fetch(SUPA_URL + '/rest/v1/locations?select=id,name&order=name', { headers: H });
  state.locations = await res.json();
  render();
}

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'welcome': app.innerHTML = renderWelcome(); break;
    case 'task':    app.innerHTML = renderTask(); break;
    case 'receive': app.innerHTML = renderReceive(); break;
    case 'goods':   app.innerHTML = renderGoods(); break;
    case 'done':    app.innerHTML = renderDone(); break;
  }
}

// ── WELCOME ───────────────────────────────────────────────────
function renderWelcome() {
  return `
    <div class="header">
      <div class="header-title">Good ${getTimeGreeting()}</div>
      <div class="header-sub">Please enter your name to continue</div>
    </div>
    <div class="card">
      <div class="card-label">Your name</div>
      <input class="name-input" id="name-input" type="text" placeholder="First name…" 
        value="${state.name}" onkeydown="if(event.key==='Enter')onNameNext()">
      <div class="card-label" style="margin-top:4px;">Location</div>
      <select class="loc-sel" id="loc-sel">
        ${state.locations.map(l => `<option value="${l.id}" ${l.id===state.locationId?'selected':''}>${l.name}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="onNameNext()">Continue →</button>
    </div>`;
}

function onNameNext() {
  const name = document.getElementById('name-input').value.trim();
  const locSel = document.getElementById('loc-sel');
  if (!name) { showToast('Please enter your name'); return; }
  state.name = name;
  state.locationId = locSel.value;
  state.locationName = locSel.options[locSel.selectedIndex].text;
  state.screen = 'task';
  render();
}

// ── TASK SELECTION ────────────────────────────────────────────
function renderTask() {
  return `
    <div class="header">
      <div class="header-title">Hi, ${state.name} 👋</div>
      <div class="header-sub">${state.locationName} · What would you like to do?</div>
    </div>
    <div class="card" style="gap:10px;">
      <button class="task-btn" onclick="onTaskSelect('receive')">
        <div class="task-icon" style="background:#E6F1FB;">📦</div>
        <div>
          <div class="task-title">Receive a delivery</div>
          <div class="task-sub">Scan products as they arrive</div>
        </div>
      </button>
      <button class="task-btn" onclick="onTaskSelect('goods')">
        <div class="task-icon" style="background:var(--amber-bg);">⚠️</div>
        <div>
          <div class="task-title">Submit goods lost</div>
          <div class="task-sub">Log a damaged, expired, or wasted item</div>
        </div>
      </button>
    </div>
    <button class="btn-secondary" onclick="state.screen='welcome';render()">← Back</button>`;
}

async function onTaskSelect(task) {
  state.task = task;
  if (task === 'receive') {
    // Load open orders for this location
    const res = await fetch(
      SUPA_URL + `/rest/v1/orders?select=id,order_ref,total_value,submitted_at&location_id=eq.${state.locationId}&status=in.(Submitted,Late)&order=submitted_at.desc&limit=4`,
      { headers: H }
    );
    state.orders = await res.json();
    state.screen = 'receive';
  } else {
    state.screen = 'goods';
  }
  render();
}

// ── RECEIVE ───────────────────────────────────────────────────
function renderReceive() {
  if (!state.selectedOrder) {
    return `
      <div class="header">
        <div class="header-title">Receive delivery</div>
        <div class="header-sub">${state.locationName} · Select the order arriving today</div>
      </div>
      <div class="card" style="gap:10px;">
        ${state.orders.length ? state.orders.map(o => `
          <button class="task-btn" onclick="onOrderSelect('${o.id}','${o.order_ref}','${o.total_value}')">
            <div class="task-icon" style="background:#E1F5EE;">🚚</div>
            <div>
              <div class="task-title">${o.order_ref}</div>
              <div class="task-sub">$${Number(o.total_value||0).toFixed(2)} · ${new Date(o.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
            </div>
          </button>`).join('')
          : '<div style="color:var(--mist);font-size:13px;text-align:center;padding:12px 0;">No open orders for this location.</div>'
        }
      </div>
      <button class="btn-secondary" onclick="state.screen='task';render()">← Back</button>`;
  }

  // Scanning view
  const confirmed = state.lines.filter(l => l.status === 'confirmed').length;
  return `
    <div class="header">
      <div class="header-title">Scanning delivery</div>
      <div class="header-sub">${state.selectedOrder.ref} · ${state.locationName}</div>
    </div>
    <div class="scan-card">
      <div class="scan-head">
        <div>
          <div class="scan-head-title">${state.selectedOrder.ref}</div>
          <div class="scan-head-sub">Scan each item as you unbox it</div>
        </div>
        <div class="scan-progress">${confirmed} of ${state.lines.length}</div>
      </div>
      <div class="scan-body">
        <div id="scan-last" class="scan-last ${state.lastScanStatus || ''}" style="${state.lastScanMsg ? 'display:block;' : 'display:none;'}">${state.lastScanMsg || ''}</div>
        <div class="scan-input-wrap">
          <input class="scan-input" id="scan-input" placeholder="Scan barcode…" onkeydown="if(event.key==='Enter')hrScan()">
          <button class="btn-scan" onclick="hrAutoScan()">Auto</button>
          <button class="btn-scan" onclick="hrScan()">Scan</button>
        </div>
        <div class="scan-items">
          ${state.lines.map(l => `
            <div class="scan-item ${l.status}">
              <span class="si-name">${l.name}</span>
              <span class="si-badge ${l.status==='confirmed'?'b-ok':'b-pend'}">${l.status==='confirmed'?'✓ Done':'Awaiting'}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <button class="btn-primary" ${confirmed===0?'disabled':''} onclick="hrComplete()">
      ${confirmed===state.lines.length && state.lines.length > 0 ? '✓ Complete receiving →' : `Complete (${confirmed}/${state.lines.length}) →`}
    </button>
    <button class="btn-secondary" onclick="state.selectedOrder=null;state.lines=[];state.lastScanMsg='';render()">← Choose different order</button>`;
}

async function onOrderSelect(id, ref, total) {
  state.selectedOrder = { id, ref, total };
  const res = await fetch(
    SUPA_URL + `/rest/v1/order_lines?select=id,qty_ordered,products(id,name,ndc)&order_id=eq.${id}`,
    { headers: H }
  );
  const lines = await res.json();
  state.lines = lines.map(l => ({
    productId: l.products?.id,
    name: l.products?.name || '—',
    ndc: l.products?.ndc || '',
    qty: l.qty_ordered,
    status: 'pending',
    lotNum: null, expDate: null,
  }));
  state.lastScanMsg = '';
  render();
}

function hrAutoScan() {
  const pending = state.lines.findIndex(l => l.status === 'pending');
  if (pending === -1) { showToast('All items scanned!'); return; }
  const line = state.lines[pending];
  line.status = 'confirmed';
  line.lotNum = 'L' + String(Math.floor(Math.random()*9000)+1000);
  line.expDate = String(Math.floor(Math.random()*12)+1).padStart(2,'0') + '/2027';
  state.lastScanMsg = '✓ ' + line.name + ' confirmed';
  state.lastScanStatus = 'ok';
  render();
}

function hrScan() {
  const val = document.getElementById('scan-input')?.value?.trim();
  if (!val) { hrAutoScan(); return; }
  const idx = state.lines.findIndex(l => l.ndc === val || l.name.toLowerCase().includes(val.toLowerCase()));
  if (idx === -1) {
    state.lastScanMsg = '⚠ No match for "' + val + '" — not on this order';
    state.lastScanStatus = 'warn';
  } else {
    state.lines[idx].status = 'confirmed';
    state.lines[idx].lotNum = 'L' + String(Math.floor(Math.random()*9000)+1000);
    state.lines[idx].expDate = '06/2027';
    state.lastScanMsg = '✓ ' + state.lines[idx].name + ' confirmed';
    state.lastScanStatus = 'ok';
  }
  render();
}

async function hrComplete() {
  const confirmed = state.lines.filter(l => l.status === 'confirmed');
  if (!confirmed.length) return;

  try {
    // Log receiving session
    await fetch(SUPA_URL + '/rest/v1/receiving_sessions', {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        location_id:     state.locationId,
        order_id:        state.selectedOrder.id,
        status:          'Completed',
        skus_expected:   state.lines.length,
        skus_scanned:    confirmed.length,
        has_discrepancy: confirmed.length < state.lines.length,
        completed_at:    new Date().toISOString(),
        notes:           'Received by ' + state.name,
      })
    });

    // Create lot records
    for (const line of confirmed) {
      if (!line.productId) continue;
      await fetch(SUPA_URL + '/rest/v1/lots', {
        method: 'POST',
        headers: { ...H, 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          product_id:      line.productId,
          location_id:     state.locationId,
          lot_number:      line.lotNum || ('L' + Date.now()),
          qty_received:    line.qty,
          qty_remaining:   line.qty,
          received_date:   new Date().toISOString().split('T')[0],
          expiration_date: line.expDate || new Date(new Date().setFullYear(new Date().getFullYear()+1)).toISOString().split('T')[0],
          status:          'Active',
          po_reference:    state.selectedOrder.ref,
        })
      });
    }

    // Log activity (fire-and-forget)
    fetch(SUPA_URL + '/rest/v1/activity_log', {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        location_id:  state.locationId,
        event_type:   'receive',
        description:  'Receiving session completed',
        reference_id: state.selectedOrder.ref,
        flag:         'ok',
        metadata: { received_by: state.name, skus: confirmed.length }
      })
    }).catch(() => {});

    state.doneTitle = 'Delivery received!';
    state.doneSub = state.selectedOrder.ref + ' · ' + confirmed.length + ' items confirmed\nReceived by ' + state.name + ' · ' + state.locationName;
    state.screen = 'done';
    render();
  } catch(err) {
    showToast('⚠ Error saving — ' + err.message);
  }
}

// ── GOODS LOST (simplified) ───────────────────────────────────
function renderGoods() {
  return `
    <div class="header">
      <div class="header-title">Log goods lost</div>
      <div class="header-sub">${state.locationName} · ${state.name}</div>
    </div>
    <div class="card" style="gap:12px;">
      <div class="card-label">What happened?</div>
      <button class="task-btn" onclick="hrLogGoods('Diagnostic duplicate')">
        <div class="task-icon" style="background:var(--purple-bg,#EEEDFE);">🔬</div>
        <div><div class="task-title">Diagnostic duplicate</div><div class="task-sub">Test rerun — Catalyst, reagents</div></div>
      </button>
      <button class="task-btn" onclick="hrLogGoods('Expired product')">
        <div class="task-icon" style="background:var(--red-bg);">⏰</div>
        <div><div class="task-title">Expired product</div><div class="task-sub">Past expiry date, must discard</div></div>
      </button>
      <button class="task-btn" onclick="hrLogGoods('Damaged / Spilled')">
        <div class="task-icon" style="background:var(--amber-bg);">💧</div>
        <div><div class="task-title">Damaged or spilled</div><div class="task-sub">Broken, dropped, or contaminated</div></div>
      </button>
      <button class="task-btn" onclick="hrLogGoods('Medication waste')">
        <div class="task-icon" style="background:#E1F5EE;">💊</div>
        <div><div class="task-title">Medication waste</div><div class="task-sub">Partial vial, unused draw</div></div>
      </button>
    </div>
    <button class="btn-secondary" onclick="state.screen='task';render()">← Back</button>`;
}

async function hrLogGoods(category) {
  try {
    await fetch(SUPA_URL + '/rest/v1/goods_lost', {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        location_id:  state.locationId,
        category:     category,
        qty_lost:     1,
        value_lost:   0,
        notes:        'Submitted by ' + state.name + ' via Hospital Receiver',
      })
    });
    fetch(SUPA_URL + '/rest/v1/activity_log', {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        location_id:  state.locationId,
        event_type:   'goods',
        description:  'Goods lost entry submitted',
        flag:         'ok',
        metadata: { category, submitted_by: state.name }
      })
    }).catch(() => {});
    state.doneTitle = 'Entry logged';
    state.doneSub = category + ' logged by ' + state.name + '\n' + state.locationName;
    state.screen = 'done';
    render();
  } catch(err) {
    showToast('⚠ Error — ' + err.message);
  }
}

// ── DONE ──────────────────────────────────────────────────────
function renderDone() {
  return `
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">${state.doneTitle || 'Done!'}</div>
      <div class="success-sub">${(state.doneSub || '').replace(/\n/g,'<br>')}</div>
      <button class="btn-primary" onclick="resetAll()">Done — start over</button>
    </div>`;
}

function resetAll() {
  state.screen = 'welcome';
  state.task = null;
  state.selectedOrder = null;
  state.lines = [];
  state.lastScanMsg = '';
  state.doneTitle = '';
  state.doneSub = '';
  render();
}

function getTimeGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}

let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

boot();
</script>
</body>
</html>
