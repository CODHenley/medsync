<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSync — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B4A;--gold:#C8922A;--gold-light:#E8B84B;
  --border:#DDD9EC;--bg:#F5F3FA;--surface:#fff;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --red:#a33030;--red-bg:#fde0d0;--mist:#8899AA;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 24px;gap:10px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-text{font-size:15px;font-weight:300;color:#fff;letter-spacing:.5px;}
.logo-text strong{font-weight:600;color:var(--gold-light);}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 4px 24px rgba(28,43,74,.08);}
.card-top{background:var(--navy);padding:28px 30px 24px;}
.card-eyebrow{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.card-title{font-size:20px;font-weight:500;color:#fff;margin-bottom:4px;}
.card-sub{font-size:12px;color:rgba(255,255,255,.5);}
.card-body{padding:28px 30px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:#4A5568;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.field input{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:none;}
.field input:focus{border-color:var(--navy);}
.field input.err{border-color:var(--red);}
.forgot{font-size:11px;color:var(--mist);text-align:right;cursor:pointer;}
.remember-row{display:flex;align-items:center;justify-content:space-between;margin-top:-8px;margin-bottom:16px;}
.remember-label{display:flex;align-items:center;gap:6px;font-size:11px;color:#4A5568;cursor:pointer;user-select:none;}
.remember-label input[type=checkbox]{width:13px;height:13px;accent-color:var(--navy);cursor:pointer;}
.btn-login{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .12s;height:40px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{background:#243459;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .spinner{display:block;}
.loading .btn-text{display:none;}
.divider{border:none;border-top:0.5px solid var(--border);margin:20px 0;}
.demo-label{font-size:10px;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}

.demo-grid{display:flex;flex-direction:column;gap:6px;}
.demo-btn{padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;background:#FAFAF8;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:space-between;transition:all .1s;border:none;width:100%;text-align:left;}
.demo-btn:hover{background:#F0EEF8;}
.demo-name{font-size:12px;font-weight:500;color:var(--navy);}
.demo-role{font-size:10px;color:var(--mist);margin-top:1px;}
.demo-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;}
.db-admin{background:rgba(28,43,74,.1);color:var(--navy);}
.db-mgr{background:var(--green-bg);color:var(--green);}
.db-lead{background:#FEF3E2;color:#C8922A;}
.db-recv{background:#E6F1FB;color:#1A6FAD;}
.error-box{background:var(--red-bg);border:0.5px solid #f0a0a0;border-radius:8px;padding:10px 13px;font-size:12px;color:var(--red);margin-bottom:16px;display:none;}
.error-box.show{display:block;}
.success-box{background:var(--green-bg);border:0.5px solid #7CC4AD;border-radius:8px;padding:10px 13px;font-size:12px;color:var(--green);margin-bottom:16px;display:none;}
.success-box.show{display:block;}
.card-footer{padding:14px 30px;border-top:0.5px solid var(--border);background:#FAFAF8;text-align:center;font-size:11px;color:var(--mist);}
#toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;}
</style>
</head>

        <div class="card-title">Set new password</div>
        <div class="card-sub">Enter and confirm your new password below</div>
      </div>
      <div class="card-body">
        <div class="error-box" id="reset-error-box"></div>
        <div class="success-box" id="reset-success-box"></div>
        <div class="field">
          <label>New Password</label>
          <input type="password" id="new-password" placeholder="••••••••••" autocomplete="new-password">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••••" autocomplete="new-password"
            onkeydown="if(event.key==='Enter')setNewPassword()">
        </div>
        <button class="btn-login" id="reset-btn" onclick="setNewPassword()">
          <div class="spinner"></div>
          <span class="btn-text">Set password</span>
        </button>
      </div>
      <div class="card-footer">MedSync · Scout Veterinary Urgent Care · Thurlow Veterinary Services</div>
    </div>
</div>
<div id="toast"></div>
<script>
const SUPA_URL = 'https://aemkdummdrmxtwrkggjw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbWtkdW1tZHJteHR3cmtnZ2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTQwNjEsImV4cCI6MjA5NTY3MDA2MX0.JzUojqfs9K6wOtrhjDnQ_knVU1wDvqR0MFH9z_r4G4s';

// Check existing session on load
(function checkSession() {
  try {
    const sess = JSON.parse(localStorage.getItem('medsync_session') || sessionStorage.getItem('medsync_session') || 'null');
    if (sess && sess.access_token && sess.expires_at) {
      const exp = new Date(sess.expires_at * 1000);
      if (exp > new Date()) {
        window.location.replace('index.html');
        return;
      }
    }
    localStorage.removeItem('medsync_session');
    localStorage.removeItem('medsync_user');
    sessionStorage.removeItem('medsync_session');
    sessionStorage.removeItem('medsync_user');
    // Pre-fill email and check "Remember me" if previously remembered
    const remembered = localStorage.getItem('medsync_remember') === '1';
    const recentLogins = JSON.parse(localStorage.getItem('medsync_recent_logins') || '[]');
    if (remembered && recentLogins[0]) {
      document.getElementById('email').value = recentLogins[0].email;
      document.getElementById('remember-me').checked = true;
    }
    renderRecentLogins();
  } catch(e) {}
})();

let busy = false;

async function signIn() {
  if (busy) return;
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-box');
  const btn      = document.getElementById('login-btn');

  errorBox.classList.remove('show');
  if (!email || !password) {
    errorBox.textContent = 'Please enter your email and password.';
    errorBox.classList.add('show');
    return;
  }

  busy = true;
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(SUPA_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      errorBox.textContent = data.error_description || 'Incorrect email or password.';
      errorBox.classList.add('show');
      document.getElementById('password').classList.add('err');
      return;
    }

    // Store session — persist if "Remember me" checked, session-only otherwise
    const remember = document.getElementById('remember-me').checked;
    const store = remember ? localStorage : sessionStorage;
    if (!remember) { localStorage.removeItem('medsync_session'); localStorage.removeItem('medsync_user'); }
    localStorage.setItem('medsync_remember', remember ? '1' : '0');
    store.setItem('medsync_session', JSON.stringify(data));

    // Fetch user profile
    const uid = JSON.parse(atob(data.access_token.split('.')[1])).sub;
    const uRes = await fetch(
      SUPA_URL + '/rest/v1/users?select=id,full_name,role,email,is_active,organization_id,locations(name)&id=eq.' + uid,
      { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + data.access_token } }
    );
    const users = await uRes.json();

    // Block inactive users
    if (!users || !users[0]) {
      errorBox.textContent = 'Account not found. Contact your administrator.';
      errorBox.classList.add('show');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }
    if (users[0].is_active === false) {
      errorBox.textContent = 'Your account has been deactivated. Contact your administrator.';
      errorBox.classList.add('show');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }

    // Flatten nested locations object so all pages read user.location_name correctly
    const u = users[0];
    const stored = {
      full_name:       u.full_name       || '',
      role:            u.role            || '',
      email:           u.email           || email,
      organization_id: u.organization_id || null,
      location_name:   u.locations       ? u.locations.name : '',
      locations:       u.locations       ? [{name: u.locations.name}] : []
    };
    store.setItem('medsync_user', JSON.stringify(stored));
    saveRecentLogin(email, stored.full_name, stored.role);
    showToast('✓ Welcome back, ' + stored.full_name.split(' ')[0] + '!');
    setTimeout(() => { window.location.replace('index.html'); }, 600);

  } catch(err) {
    errorBox.textContent = 'Connection error. Please try again.';
    errorBox.classList.add('show');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    busy = false;
  }
}

const ROLE_LABELS = { admin:'Admin', manager:'Manager', inventory_lead:'Inv. Lead', receiver:'Receiver', hospital_manager:'Manager', clinical:'Manager' };
const ROLE_BADGE  = { admin:'db-admin', manager:'db-mgr', inventory_lead:'db-lead', receiver:'db-recv' };

function getRecentLogins() {
  try { return JSON.parse(localStorage.getItem('medsync_recent_logins') || '[]'); }
  catch(e) { return []; }
}

function saveRecentLogin(email, name, role) {
  const logins = getRecentLogins().filter(l => l.email !== email);
  logins.unshift({ email, name, role, ts: Date.now() });
  localStorage.setItem('medsync_recent_logins', JSON.stringify(logins.slice(0, 30)));
}

function renderRecentLogins() {
  const logins = getRecentLogins().slice(0, 4);
  const section = document.getElementById('recent-logins-section');
  const grid = document.getElementById('demo-grid');
  if (!logins.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = logins.map(u => {
    const badge = ROLE_BADGE[u.role] || 'db-admin';
    const label = ROLE_LABELS[u.role] || u.role;
    return `<button class="demo-btn" onclick="quickLogin('${u.email}')">
      <div><div class="demo-name">${u.name || u.email}</div><div class="demo-role">${u.email}</div></div>
      <span class="demo-badge ${badge}">${label}</span>
    </button>`;
  }).join('');
}

function quickLogin(email) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = '';
  document.getElementById('password').focus();
  document.getElementById('error-box').classList.remove('show');
}

async function forgotPassword() {
  const email = document.getElementById('email').value.trim();
  if (!email) { document.getElementById('email').focus(); showToast('Enter your email first'); return; }
  await fetch(SUPA_URL + '/auth/v1/recover', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, redirectTo: window.location.href.split('?')[0].split('#')[0] })
  });
  showToast('✓ Check your email for a reset link');
}

let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => { t.style.opacity = '0'; }, 2800);
}


// ── Password recovery flow ────────────────────────────────────────────────────
let _recoveryToken = null;

(function detectRecovery() {
  const hash = window.location.hash.substring(1);
  const params = {};
  hash.split('&').forEach(pair => {
    const eq = pair.indexOf('=');
    if (eq < 1) return;
    const k = decodeURIComponent(pair.substring(0, eq));
    const v = decodeURIComponent(pair.substring(eq + 1));
    params[k] = v;
  });
  if (params.type === 'recovery' && params.access_token) {
    _recoveryToken = params.access_token;
    // Hide login card content, show reset panel
    document.querySelector('.card-top').style.display = 'none';
    document.querySelector('.card-body').style.display = 'none';
    document.querySelector('.card-footer').style.display = 'none';
    document.getElementById('reset-panel').style.display = 'block';
    // Clean up URL
    history.replaceState(null, '', window.location.pathname);
  }
})();

async function setNewPassword() {
  const np = document.getElementById('new-password').value;
  const cp = document.getElementById('confirm-password').value;
  const errBox = document.getElementById('reset-error-box');
  const okBox  = document.getElementById('reset-success-box');
  errBox.textContent = ''; errBox.classList.remove('show');
  okBox.textContent  = ''; okBox.classList.remove('show');

  if (!np || np.length < 8) {
    errBox.textContent = 'Password must be at least 8 characters.';
    errBox.classList.add('show'); return;
  }
  if (np !== cp) {
    errBox.textContent = 'Passwords do not match.';
    errBox.classList.add('show'); return;
  }

  const btn = document.getElementById('reset-btn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    const res = await fetch(SUPA_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + _recoveryToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password: np })
    });
    const data = await res.json();
    if (!res.ok) {
      errBox.textContent = data.message || data.msg || 'Failed to update password.';
      errBox.classList.add('show');
    } else {
      okBox.textContent = 'Password updated! Redirecting to sign in...';
      okBox.classList.add('show');
      setTimeout(() => window.location.replace('medsync_login.html'), 2000);
    }
  } catch(e) {
    errBox.textContent = 'Error: ' + e.message;
    errBox.classList.add('show');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
