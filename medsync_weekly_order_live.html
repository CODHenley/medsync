<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSync — Purchase Orders</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1C2B4A;--navy-mid:#243459;
  --gold:#C8922A;--gold-light:#E8B84B;--gold-pale:#FDF8EE;
  --slate:#4A5568;--mist:#8899AA;--border:#DDD9EC;
  --bg:#F7F8FC;--surface:#fff;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-border:#A8D8C8;
  --teal:#0891B2;--teal-bg:#E0F7FC;
  --amber:#a0700a;--amber-bg:#fdefc7;--amber-border:#f0d070;
  --red:#a33030;--red-bg:#FFF0F0;
  --purple:#534AB7;--purple-bg:#EEEDFE;
}
html,body{height:100%;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:13px;line-height:1.5;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar{background:var(--navy);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-title{font-size:14px;font-weight:500;color:#fff;}
select.loc-sel{background:rgba(255,255,255,.12);border:0.5px solid rgba(255,255,255,.2);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 10px;border-radius:7px;outline:none;height:30px;cursor:pointer;}
select.loc-sel option{background:var(--navy);color:#fff;}
.window-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em;display:flex;align-items:center;gap:5px;}
.window-pill.open{background:rgba(15,110,86,.85);color:#fff;}
.window-pill.closed{background:rgba(160,112,10,.85);color:#fff;}

/* ── WINDOW BANNER ──────────────────────────────────────────── */
.window-banner{padding:11px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:0.5px solid;}
.window-banner.open{background:#EAF7F1;border-color:var(--green-border);}
.window-banner.closed{background:var(--gold-pale);border-color:var(--amber-border);}
.wb-icon{font-size:22px;flex-shrink:0;}
.wb-body{flex:1;}
.wb-title{font-size:13px;font-weight:600;}
.wb-title.open{color:var(--green);}
.wb-title.closed{color:var(--amber);}
.wb-sub{font-size:11px;color:var(--slate);margin-top:1px;}
.wb-right{text-align:right;flex-shrink:0;}
.wb-countdown{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--green);letter-spacing:.02em;}
.wb-countdown.closed{font-size:13px;font-weight:600;color:var(--amber);}
.wb-countdown-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mist);margin-top:1px;}

/* ── TABS ───────────────────────────────────────────────────── */
.tabs{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;gap:0;flex-shrink:0;}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--mist);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;transition:color .12s;}
.tab:hover:not(.active){color:var(--slate);}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;}
.tab-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;background:#F0EEF8;color:var(--slate);}
.tab.active .tab-badge{background:var(--navy);color:#fff;}

/* ── SCROLL AREA ────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:16px 20px 96px;}

/* ── QUEUE STAT BAR ─────────────────────────────────────────── */
.stat-bar{display:flex;align-items:center;gap:16px;padding:10px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-bottom:16px;}
.sb-item{display:flex;flex-direction:column;}
.sb-val{font-size:17px;font-weight:700;color:var(--navy);line-height:1.1;}
.sb-label{font-size:10px;color:var(--mist);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.sb-divider{width:1px;height:28px;background:var(--border);}
.sb-spacer{flex:1;}
.add-btn{padding:6px 16px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;height:32px;transition:background .12s;}
.add-btn:hover{background:var(--navy-mid);}

/* ── SECTION LABEL ──────────────────────────────────────────── */
.sec-label{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sec-text{font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.07em;}
.sec-count{font-size:10px;background:#F0EEF8;color:var(--slate);padding:1px 7px;border-radius:10px;font-weight:600;}

/* ── QUEUE TABLE ────────────────────────────────────────────── */
.q-table{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.q-col-hdr{display:grid;grid-template-columns:1fr 100px 120px 90px 36px;padding:8px 14px;background:#F7F6FC;border-bottom:0.5px solid var(--border);}
.q-col-hdr span{font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.06em;}
.q-col-hdr span:nth-child(2),.q-col-hdr span:nth-child(3),.q-col-hdr span:nth-child(4){text-align:center;}
.q-row{display:grid;grid-template-columns:1fr 100px 120px 90px 36px;padding:10px 14px;border-bottom:0.5px solid #F0EEF5;align-items:center;transition:background .1s;}
.q-row:last-child{border-bottom:none;}
.q-row:hover{background:#FAFAFE;}
.q-name-cell{cursor:pointer;display:flex;align-items:flex-start;gap:6px;}
.q-name-cell:hover .q-name{color:var(--gold);}
.q-name-arrow{color:var(--mist);font-size:13px;margin-top:1px;flex-shrink:0;transition:color .1s;}
.q-name-cell:hover .q-name-arrow{color:var(--gold);}
.q-name{font-size:12px;font-weight:500;color:var(--navy);line-height:1.3;}
.vendor-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:3px;letter-spacing:.02em;}
.q-onhand{font-family:'DM Mono',monospace;font-size:12px;text-align:center;color:var(--slate);}
.q-onhand.low{color:var(--red);}
.qty-ctrl{display:flex;align-items:center;gap:5px;justify-content:center;}
.qty-btn{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:400;color:var(--navy);transition:background .1s;line-height:1;}
.qty-btn:hover{background:#F0EEF8;}
.qty-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;min-width:24px;text-align:center;color:var(--navy);}
.q-price{font-family:'DM Mono',monospace;font-size:12px;text-align:center;color:var(--slate);}
.qty-unit{font-size:10px;color:var(--mist);margin-left:2px;white-space:nowrap;}
.q-remove{background:none;border:none;color:var(--mist);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s;}
.q-remove:hover{color:var(--red);background:var(--red-bg);}

/* ── EMPTY STATES ───────────────────────────────────────────── */
.empty-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:36px;text-align:center;}
.empty-icon{font-size:30px;color:var(--mist);margin-bottom:8px;}
.empty-title{font-size:14px;font-weight:500;color:var(--slate);margin-bottom:4px;}
.empty-sub{font-size:12px;color:var(--mist);}

/* ── VENDOR CARDS ───────────────────────────────────────────── */
.vendor-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.vendor-header{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.v-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.v-name{font-size:13px;font-weight:600;color:var(--navy);flex:1;}
.v-meta{font-size:11px;color:var(--mist);margin-right:8px;}
.v-subtotal{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--navy);margin-right:12px;}
.v-btn-group{display:flex;align-items:center;gap:6px;}
.v-print-btn{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;color:#fff;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;height:30px;transition:opacity .12s;white-space:nowrap;}
.v-print-btn:hover{opacity:.85;}
.v-print-btn.done{background:var(--green-bg)!important;color:var(--green)!important;cursor:default;}
.v-print-btn.done:hover{opacity:1;}
.v-gen-btn{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--navy);color:#fff;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;height:30px;transition:opacity .12s;white-space:nowrap;}
.v-gen-btn:hover{opacity:.85;}
.v-gen-btn.done{background:var(--green-bg)!important;color:var(--green)!important;cursor:default;}
.v-gen-btn.done:hover{opacity:1;}

.v-item-hdr{display:grid;grid-template-columns:1fr 70px 80px 80px;padding:7px 16px;background:#F7F6FC;border-bottom:0.5px solid var(--border);}
.v-item-hdr span{font-size:10px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.05em;}
.v-item-hdr span:not(:first-child){text-align:right;}
.v-item-row{display:grid;grid-template-columns:1fr 70px 80px 80px;padding:9px 16px;border-bottom:0.5px solid #F0EEF5;align-items:center;}
.v-item-row:last-child{border-bottom:none;}
.vi-name{font-size:12px;font-weight:500;color:var(--navy);}
.vi-qty{font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:var(--slate);}
.vi-price{font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:var(--slate);}
.vi-total{font-family:'DM Mono',monospace;font-size:12px;text-align:right;font-weight:600;color:var(--navy);}

.shipping-bar{padding:9px 16px;display:flex;align-items:center;gap:8px;border-top:0.5px solid var(--border);font-size:11px;}
.shipping-bar.good{background:var(--green-bg);color:var(--green);}
.shipping-bar.nudge{background:var(--gold-pale);color:var(--amber);}
.shipping-bar.none{background:#F7F6FC;color:var(--slate);}

/* ── WINDOW CLOSED WARNING (Build PO) ───────────────────────── */
.window-warn{background:var(--gold-pale);border:0.5px solid var(--amber-border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--amber);}

/* ── STICKY FOOTER ──────────────────────────────────────────── */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100;}
.footer-info{font-size:12px;color:var(--slate);}
.footer-info strong{color:var(--navy);}
.footer-btns{display:flex;gap:8px;}
.btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--navy);font-family:'DM Sans',sans-serif;white-space:nowrap;height:32px;display:flex;align-items:center;gap:6px;transition:all .12s;}
.btn:hover{background:#F0EEF8;}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{background:var(--navy-mid);}
.btn-primary:disabled{background:var(--mist);border-color:var(--mist);cursor:not-allowed;opacity:.65;}

/* ── ADD ITEM MODAL ─────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,43,74,.5);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:500px;max-width:94vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.22);}
.modal-title{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:14px;flex-shrink:0;}
.modal-search{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:var(--navy);margin-bottom:10px;flex-shrink:0;}
.modal-search:focus{border-color:var(--navy);}
.prod-list{flex:1;overflow-y:auto;border:0.5px solid var(--border);border-radius:8px;margin-bottom:14px;min-height:120px;max-height:240px;}
.prod-opt{padding:10px 12px;border-bottom:0.5px solid #F0EEF5;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.prod-opt:last-child{border-bottom:none;}
.prod-opt:hover{background:#FAFAFE;}
.prod-opt.sel{background:#F0EEF8;}
.po-name{font-size:12px;font-weight:500;color:var(--navy);}
.po-meta{font-size:10px;color:var(--mist);margin-top:2px;}
.po-oh{font-size:11px;font-family:'DM Mono',monospace;color:var(--slate);flex-shrink:0;}
.modal-row{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-bottom:14px;}
.modal-label{font-size:12px;color:var(--slate);white-space:nowrap;}
.modal-qty{width:72px;padding:6px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;outline:none;color:var(--navy);}
.modal-qty:focus{border-color:var(--navy);}
.modal-vendor{flex:1;padding:6px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--navy);background:var(--surface);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.btn-cancel{padding:8px 16px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--navy);}
.btn-add{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── TOAST ──────────────────────────────────────────────────── */
#toast{position:fixed;bottom:70px;right:20px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s;z-index:400;}

/* ── PRINT STYLES ───────────────────────────────────────────── */
@media print{
  body,html{overflow:visible!important;height:auto!important;background:#fff;}
  .topbar,.window-banner,.tabs,.sticky-footer,#add-modal,#toast{display:none!important;}
  .content{overflow:visible!important;padding:0!important;}
}

/* ── MOBILE ──────────────────────────────────────────────────── */
@media (max-width:600px) {
  /* Topbar */
  .topbar{padding:0 12px;}
  .tb-title{font-size:13px;}
  select.loc-sel{font-size:11px;padding:4px 8px;max-width:130px;height:28px;}
  .window-pill{font-size:10px;padding:3px 8px;}

  /* Window banner: hide countdown on mobile */
  .window-banner{padding:8px 12px;gap:10px;}
  .wb-right{display:none;}

  /* Stat bar: wrap into 2×2 */
  .stat-bar{flex-wrap:wrap;gap:8px 16px;padding:8px 12px;}
  .sb-divider{display:none;}
  .sb-spacer{display:none;}
  .add-btn{width:100%;justify-content:center;}

  /* Content */
  .content{padding:10px 10px 100px;}

  /* Queue table: name | qty ctrl | remove (3 cols) */
  .q-col-hdr,
  .q-row{grid-template-columns:1fr 96px 36px;}
  .q-name-arrow{display:none;}

  /* Hide On Hand (2nd) and Price (4th) */
  .q-col-hdr span:nth-child(2),
  .q-row > *:nth-child(2),
  .q-col-hdr span:nth-child(4),
  .q-row > *:nth-child(4){display:none;}

  /* Qty controls */
  .qty-btn{width:28px;height:28px;font-size:16px;}
  .qty-num{font-size:14px;}

  /* Vendor header: hide meta, keep name + subtotal + print btn */
  .v-meta{display:none;}

  /* Vendor items: name | qty | total (hide price) */
  .v-item-hdr,
  .v-item-row{grid-template-columns:1fr 56px 72px;}
  .v-item-hdr span:nth-child(3),
  .v-item-row > *:nth-child(3){display:none;}

  /* Sticky footer */
  .sticky-footer{padding:8px 12px;flex-wrap:wrap;gap:8px;}
  .footer-info{font-size:11px;}
  .footer-btns{width:100%;justify-content:flex-end;}
  .btn{font-size:11px;padding:6px 12px;}
  .btn-primary{flex:1;justify-content:center;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <span class="tb-title">Purchase Orders</span>
    <select class="loc-sel" id="loc-select" onchange="onLocChange()">
      <option value="">Select location…</option>
    </select>
  </div>
  <div id="window-pill" class="window-pill closed">
    <i class="ti ti-clock"></i>
    <span id="pill-text">Window closed</span>
  </div>
</div>

<!-- WINDOW BANNER -->
<div class="window-banner closed" id="window-banner">
  <div class="wb-icon" id="wb-icon">⏳</div>
  <div class="wb-body">
    <div class="wb-title closed" id="wb-title">Loading…</div>
    <div class="wb-sub" id="wb-sub"></div>
  </div>
  <div class="wb-right">
    <div class="wb-countdown closed" id="wb-countdown"></div>
    <div class="wb-countdown-label" id="wb-cd-label"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-queue" onclick="switchView('queue')">
    <i class="ti ti-list"></i> Queue
    <span class="tab-badge" id="badge-queue">0</span>
  </div>
  <div class="tab" id="tab-build" onclick="switchView('build')">
    <i class="ti ti-file-invoice"></i> Build PO
    <span class="tab-badge" id="badge-build">0</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="content-area"></div>

<!-- STICKY FOOTER -->
<div class="sticky-footer">
  <div class="footer-info" id="footer-info">Loading…</div>
  <div class="footer-btns">
    <button class="btn" onclick="switchView('queue')"><i class="ti ti-list"></i> View Queue</button>
    <button class="btn btn-primary" id="print-all-btn" onclick="printAllPOs()" disabled>
      <i class="ti ti-printer"></i> Print All POs
    </button>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add Item to Queue</div>
    <input class="modal-search" id="modal-search" placeholder="Search products…" oninput="filterProducts(this.value)">
    <div class="prod-list" id="prod-list"></div>
    <div class="modal-row">
      <span class="modal-label">Qty to order</span>
      <input class="modal-qty" id="modal-qty" type="number" min="1" value="1">
      <span class="modal-label" style="margin-left:8px;">Vendor</span>
      <select class="modal-vendor" id="modal-vendor">
        <option>MWI Animal Health</option>
        <option>Covetrus</option>
        <option>Patterson Veterinary</option>
        <option>Midwest Veterinary Supply</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-add" id="modal-add-btn" onclick="addSelectedToQueue()" disabled>Add to Queue</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL = 'https://aemkdummdrmxtwrkggjw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbWtkdW1tZHJteHR3cmtnZ2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTQwNjEsImV4cCI6MjA5NTY3MDA2MX0.JzUojqfs9K6wOtrhjDnQ_knVU1wDvqR0MFH9z_r4G4s';
const _sess = (()=>{ try{ return JSON.parse(localStorage.getItem('medsync_session')||'{}'); }catch(e){ return {}; } })();
const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+(_sess.access_token||SUPA_KEY), 'Content-Type': 'application/json' };

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  locationId:   null,
  locationName: null,
  view:         'queue',   // 'queue' | 'build'
  queue:        [],        // { id, productId, productName, vendor, onHand, orderQty, unitPrice, gpoPrice, autoFlagged }
  allProducts:  [],        // for modal search
  submitted:    new Set(), // vendor names printed this session
  generated:    new Set(), // vendor names pushed to receiving this session
};

// ── Vendor config ────────────────────────────────────────────────────────────
const VENDORS = {
  'MWI Animal Health':    { color:'#C8922A', bg:'#FDF8EE', border:'#F0D896', threshold:500, place:'mwiah.com or your MWI rep' },
  'Covetrus':             { color:'#0891B2', bg:'#E0F7FC', border:'#A0D8EC', threshold:350, place:'covetrus.com or your Covetrus rep' },
  'Patterson Veterinary': { color:'#534AB7', bg:'#EEEDFE', border:'#C4C0F0', threshold:400, place:'pattersonvet.com or your Patterson rep' },
  'Midwest Veterinary Supply': { color:'#4A5568', bg:'#F0EEF8', border:'#DDD9EC', threshold:300, place:'midwestvet.net or your rep' },
};

function inferVendor(name) {
  const n = name.toLowerCase();
  if (/gauze|bandage|tape|wrap|syringe|needle|catheter|glove|gown|drape|swab|cotton|alcohol pad|tongue depress|staple|suture|e-collar|lancet|culture/.test(n))
    return 'Patterson Veterinary';
  if (/tablet|capsule|chewable|oral|suspension|syrup|trazodone|prednisolone|amoxicillin|metronidazole|carprofen|gabapentin|meloxicam|cerenia|tramadol/.test(n))
    return 'Covetrus';
  return 'MWI Animal Health';
}

function vendorBadge(vendor) {
  const v = VENDORS[vendor] || { color:'#4A5568', bg:'#F0EEF8' };
  return `<span class="vendor-badge" style="background:${v.bg};color:${v.color};">${vendor}</span>`;
}

// ── PO Window logic ──────────────────────────────────────────────────────────
function getWindowState() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue
  const h   = now.getHours();
  return (day === 1 || (day === 2 && h < 13)) ? 'open' : 'closed';
}

function getWindowInfo() {
  const now = new Date();
  const day = now.getDay();
  const ws  = getWindowState();
  if (ws === 'open') {
    const tue = new Date(now);
    tue.setDate(now.getDate() + ((2 - day + 7) % 7));
    tue.setHours(13, 0, 0, 0);
    const diff = Math.max(0, tue - now);
    return { state:'open', diff,
      cutoffLabel: new Date(tue).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · 1:00 PM' };
  } else {
    const daysToMon = day === 0 ? 1 : 8 - day;
    const nextMon = new Date(now);
    nextMon.setDate(now.getDate() + daysToMon);
    return { state:'closed', daysAway: daysToMon,
      nextLabel: nextMon.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}) };
  }
}

function fmtCountdown(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateBanner() {
  const info = getWindowInfo();
  const banner = document.getElementById('window-banner');
  const pill   = document.getElementById('window-pill');
  const pillTxt = document.getElementById('pill-text');
  const wbTitle = document.getElementById('wb-title');
  const wbSub   = document.getElementById('wb-sub');
  const wbIcon  = document.getElementById('wb-icon');
  const wbCD    = document.getElementById('wb-countdown');
  const wbCDLbl = document.getElementById('wb-cd-label');

  if (info.state === 'open') {
    banner.className = 'window-banner open';
    pill.className   = 'window-pill open';
    pillTxt.textContent = 'PO Window Open';
    wbIcon.textContent  = '🟢';
    wbTitle.className   = 'wb-title open';
    wbTitle.textContent = 'PO Window is Open';
    wbSub.textContent   = 'Print purchase orders by ' + info.cutoffLabel + ' for same-week delivery';
    wbCD.className      = 'wb-countdown';
    wbCD.textContent    = fmtCountdown(info.diff);
    wbCDLbl.textContent = 'Until cutoff';
  } else {
    banner.className = 'window-banner closed';
    pill.className   = 'window-pill closed';
    pillTxt.textContent = 'Window Closed';
    wbIcon.textContent  = '⏳';
    wbTitle.className   = 'wb-title closed';
    wbTitle.textContent = 'Orders are queuing — window opens ' + info.nextLabel;
    wbSub.textContent   = 'Add items to the queue anytime · Print PO opens Monday–Tuesday before 1 PM';
    wbCD.className      = 'wb-countdown closed';
    wbCD.textContent    = info.daysAway === 1 ? 'Tomorrow' : 'In ' + info.daysAway + ' days';
    wbCDLbl.textContent = 'Next window';
  }
}

// ── Week start (Monday of current week) ─────────────────────────────────────
function getWeekStart() {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  mon.setHours(0,0,0,0);
  return mon.toISOString().slice(0,10);
}

// ── Price helpers ────────────────────────────────────────────────────────────
function getPrice(name) {
  const map = { 'Ketamine':142,'Propofol':95,'Alfaxalone':112,'Fentanyl':185,'Midazolam':68,
    'Dexmedetomidine':124,'Butorphanol':88,'Hydromorphone':218,'Buprenorphine':188,'Diazepam':58,
    'Epinephrine':38,'Atropine':42,'Insulin':78,'Rabies':18,'FVRCP':22,'DA2PP':24,'Bordetella':19,
    'Gabapentin':48.50,'Maropitant':84.20,'Cerenia':84.20,'Tramadol':62,'Meloxicam':22.40,
    'Ondansetron':38.40,'Carprofen':118,'Prednisolone':32,'Trazodone':28,'Enrofloxacin':64,
    'Dexamethasone':44,'Famotidine':36,'Amoxicillin':52,'Metronidazole':38,'LRS':8,'NaCl':7,
    'Dextrose':24,'Gauze':18,'Bandage':22,'Tape':16,'Syringe':45,'Catheter':68,
    'Glove':52,'Drape':95,'Culture':44,'Alcohol':24,'Cotton':12,'Heartworm':88,
    'Ear Cleaner':28,'Tongue':12,'Wrap':18 };
  for (const [k,v] of Object.entries(map)) if (name.includes(k)) return v;
  return 45.00;
}

function getMin(name) {
  const map = { 'Ketamine':5,'Propofol':4,'Alfaxalone':3,'Dexmedetomidine':3,'Butorphanol':3,
    'Hydromorphone':5,'Buprenorphine':5,'Epinephrine':6,'Atropine':4,'Insulin':2,
    'Rabies':10,'FVRCP':10,'DA2PP':10,'Gabapentin':50,'Maropitant':5,'Cerenia':5,
    'Meloxicam':3,'Ondansetron':3,'Carprofen':20,'Gauze':4,'Syringe':2,'Glove':3 };
  for (const [k,v] of Object.entries(map)) if (name.includes(k)) return v;
  return 5;
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  updateBanner();
  setInterval(() => {
    updateBanner();
    if (getWindowState() === 'open') {
      const info = getWindowInfo();
      document.getElementById('wb-countdown').textContent = fmtCountdown(info.diff);
    }
  }, 1000);

  await loadLocations();
}

async function loadLocations() {
  try {
    const res  = await fetch(SUPA_URL + '/rest/v1/locations?select=id,name&order=name', { headers: H });
    const locs = await res.json();
    const sel  = document.getElementById('loc-select');
    locs.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.id; opt.textContent = l.name;
      sel.appendChild(opt);
    });
    if (locs.length) {
      let _mu = {};
      try { _mu = JSON.parse(localStorage.getItem('medsync_user')||'{}'); } catch(e) {}
      let locName = null;
      if (_mu.role === 'manager' && _mu.locations) {
        if (Array.isArray(_mu.locations) && _mu.locations[0]) locName = _mu.locations[0].name;
        else if (_mu.locations.name) locName = _mu.locations.name;
      }
      const match = locName ? locs.find(l => l.name === locName) : null;
      const loc   = match || locs[0];
      sel.value = loc.id;
      state.locationId   = loc.id;
      state.locationName = loc.name;
      await loadQueue();
    }
  } catch(e) { showToast('Error loading locations'); }
}

async function onLocChange() {
  const sel = document.getElementById('loc-select');
  state.locationId   = sel.value;
  state.locationName = sel.options[sel.selectedIndex].text;
  state.submitted.clear();
  await loadQueue();
}

// ── Load queue ───────────────────────────────────────────────────────────────
async function loadQueue() {
  renderLoading();
  const weekStart = getWeekStart();

  try {
    // Load existing queue items for this location + week
    const qRes = await fetch(
      SUPA_URL + `/rest/v1/po_items?select=*&location_id=eq.${state.locationId}&week_start=eq.${weekStart}&status=eq.queued&order=added_at`,
      { headers: H }
    );
    let existing = await qRes.json();
    if (!Array.isArray(existing)) existing = [];

    // Load products + on-hand from Vetspire inventory_snapshots (dispensing units)
    // Falls back to lots table if no snapshot data exists for this location
    const [prodsRes, snapRes, lotsRes] = await Promise.all([
      fetch(SUPA_URL + '/rest/v1/products?select=id,name,vendor,category,qty_min,qty_max,dispensing_unit,package_size,purchase_unit,unit_price,price_year&order=name', { headers: H }),
      fetch(SUPA_URL + `/rest/v1/inventory_snapshots?select=product_name,on_hand&location_name=eq.${encodeURIComponent(state.locationName)}&snapshot_date=eq.${new Date().toISOString().slice(0,10)}&order=product_name`, { headers: H }),
      fetch(SUPA_URL + `/rest/v1/lots?select=product_id,qty_remaining&location_id=eq.${state.locationId}&status=neq.Disposed`, { headers: H })
    ]);
    const products  = await prodsRes.json();
    const snapshots = await snapRes.json();
    const lots      = await lotsRes.json();

    // Primary: Vetspire on-hand by product name (dispensing units — mL, tablets, capsules…)
    // This is the same unit Vetspire uses for min/max, so comparisons are apples-to-apples
    const snapOnHand = {};
    if (Array.isArray(snapshots)) {
      snapshots.forEach(s => { snapOnHand[s.product_name.toLowerCase()] = s.on_hand; });
    }

    // Fallback: lot-based on-hand by product_id (Vetcove receiving units — use only if no snapshot)
    const lotsOnHand = {};
    if (Array.isArray(lots)) lots.forEach(l => { lotsOnHand[l.product_id] = (lotsOnHand[l.product_id]||0) + (l.qty_remaining||0); });

    // Resolve on-hand per product: prefer Vetspire snapshot, fall back to lots
    const onHand = {};
    const onHandSource = {}; // track which source was used for display
    // Fuzzy snapshot lookup: Vetspire names (snapshots) ≠ Vetcove names (products table).
    // Jaccard token overlap bridges "Catalyst ALT: 12 Count" ↔ "Catalyst Alkaline Aminotransferase (ALT)"
    function tokenize(s) {
      return new Set(s.toLowerCase().split(/[^a-z0-9]+/).filter(t => t.length >= 2));
    }
    function bestSnapMatch(productName) {
      const lower = productName.toLowerCase();
      if (snapOnHand[lower] != null) return snapOnHand[lower]; // exact match
      const pToks = tokenize(productName);
      let bestScore = 0, bestVal = null;
      for (const [snapName, val] of Object.entries(snapOnHand)) {
        const sToks = tokenize(snapName);
        let inter = 0;
        for (const t of pToks) { if (sToks.has(t)) inter++; }
        const score = inter / (pToks.size + sToks.size - inter);
        if (score > bestScore) { bestScore = score; bestVal = val; }
      }
      return bestScore >= 0.25 ? bestVal : null;
    }

    if (Array.isArray(products)) {
      products.forEach(p => {
        const snapVal = bestSnapMatch(p.name);
        if (snapVal != null) {
          onHand[p.id] = snapVal;
          onHandSource[p.id] = 'vetspire';
        } else if (lotsOnHand[p.id] != null) {
          onHand[p.id] = lotsOnHand[p.id];
          onHandSource[p.id] = 'lots';
        }
      });
    }

    // Build a lookup of Vetspire-tracked product IDs (qty_min set)
    const vetspireTracked = new Set(
      (Array.isArray(products) ? products : []).filter(p => p.qty_min != null).map(p => p.id)
    );

    // Remove any existing queued items that aren't Vetspire-tracked (cleanup from before filter)
    const staleIds = existing.filter(i => i.product_id && !vetspireTracked.has(i.product_id) && i.auto_flagged).map(i => i.id);
    if (staleIds.length > 0) {
      // Delete stale auto-flagged items silently
      staleIds.forEach(id => {
        fetch(SUPA_URL + `/rest/v1/po_items?id=eq.${id}`, { method: 'DELETE', headers: H }).catch(()=>{});
      });
      existing = existing.filter(i => !staleIds.includes(i.id));
    }

    // Auto-flag below-min items not already queued
    const queued = new Set(existing.map(i => i.product_id).filter(Boolean));
    const autoAdd = [];
    if (Array.isArray(products)) {
      for (const p of products) {
        // Only auto-recommend Vetspire-tracked products (qty_min set)
        if (p.qty_min == null) continue;
        // on_hand is in dispensing units; qty_min is also in dispensing units
        const oh  = onHand[p.id] || 0;
        const min = p.qty_min;
        if (oh < min && !queued.has(p.id)) {
          const max          = p.qty_max || min * 2;
          const pkgSize      = p.package_size || 1;
          // Order qty is in Vetcove purchase units (bottles, boxes, etc.)
          const orderQty     = Math.max(1, Math.ceil((max - oh) / pkgSize));
          // Use verified Vetcove historical price; fall back to hardcoded estimate
          const unit         = p.unit_price || getPrice(p.name);
          const gpo          = Math.round(unit * 0.88 * 100) / 100;
          autoAdd.push({
            location_id:    state.locationId,
            product_id:     p.id,
            product_name:   p.name,
            vendor:         p.vendor || inferVendor(p.name),
            qty_ordered:    orderQty,
            unit_price:     unit,
            gpo_price:      gpo,
            on_hand:        oh,
            week_start:     weekStart,
            status:         'queued',
            auto_flagged:   true,
          });
        }
      }
    }

    if (autoAdd.length > 0) {
      try {
        const ins = await fetch(SUPA_URL + '/rest/v1/po_items', {
          method: 'POST',
          headers: { ...H, 'Prefer':'return=representation' },
          body: JSON.stringify(autoAdd)
        });
        const inserted = await ins.json();
        if (Array.isArray(inserted)) existing.push(...inserted);
      } catch(e) { /* table may not exist yet — use demo */ }
    }

    // Build product lookup by ID and by name (name lookup catches old items without product_id)
    const prodLookup = {};
    const prodByName = {};
    if (Array.isArray(products)) products.forEach(p => {
      prodLookup[p.id] = p;
      prodByName[p.name.toLowerCase()] = p;
    });

    state.queue = existing.map(item => {
      const prod = prodLookup[item.product_id]
                || prodByName[(item.product_name || '').toLowerCase()]
                || {};
      return {
        id:              item.id,
        productId:       item.product_id,
        productName:     item.product_name,
        vendor:          item.vendor || inferVendor(item.product_name),
        onHand:          item.on_hand || 0,
        dispensingUnit:  prod.dispensing_unit || '',   // Vetspire unit (capsules, mL…)
        purchaseUnit:    prod.purchase_unit   || '',   // Vetcove unit (bottle, box…)
        packageSize:     prod.package_size    || 1,
        orderQty:        item.qty_ordered || 1,
        unitPrice:       item.unit_price  || getPrice(item.product_name),
        gpoPrice:        item.gpo_price   || Math.round((prod.unit_price || getPrice(item.product_name))*0.88*100)/100,
        priceYear:       prod.price_year  || null,
        autoFlagged:     item.auto_flagged,
      };
    });

    // Store all products for modal search
    state.allProducts = Array.isArray(products) ? products.map(p => ({
      id:           p.id,
      name:         p.name,
      vendor:       p.vendor || inferVendor(p.name),
      onHand:       onHand[p.id] || 0,
      dispensingUnit: p.dispensing_unit || '',
      purchaseUnit:   p.purchase_unit   || '',
      packageSize:    p.package_size    || 1,
    })) : [];

    // If po_items table doesn't exist yet, fall back to demo queue
    if (existing.length === 0 && autoAdd.length === 0) {
      loadDemoQueue();
      return;
    }

  } catch(e) {
    loadDemoQueue();
    return;
  }

  renderAll();
}

// ── Render orchestrator ──────────────────────────────────────────────────────
function renderAll() {
  const qCount = state.queue.length;
  const vendors = groupByVendor();
  const vCount  = Object.keys(vendors).length;

  document.getElementById('badge-queue').textContent = qCount;
  document.getElementById('badge-build').textContent = vCount + (vCount === 1 ? ' vendor' : ' vendors');

  const totalEst = state.queue.reduce((s, i) => s + i.gpoPrice * i.orderQty, 0);
  document.getElementById('footer-info').innerHTML =
    `<strong>${qCount}</strong> item${qCount !== 1 ? 's' : ''} queued &nbsp;·&nbsp; Est. <strong>$${totalEst.toFixed(2)}</strong> GPO total`;

  const printAllBtn = document.getElementById('print-all-btn');
  printAllBtn.disabled = qCount === 0;

  if (state.view === 'queue') renderQueueView();
  else renderBuildView();
}

function renderLoading() {
  document.getElementById('content-area').innerHTML =
    '<div class="empty-card" style="margin-top:0;"><div class="empty-icon"><i class="ti ti-loader" style="animation:spin 1s linear infinite;display:inline-block;"></i></div><div class="empty-title">Loading queue…</div></div>';
}

// ── Queue view ───────────────────────────────────────────────────────────────
function renderQueueView() {
  const autoItems   = state.queue.filter(i => i.autoFlagged);
  const manualItems = state.queue.filter(i => !i.autoFlagged);

  let html = `
    <div class="stat-bar">
      <div class="sb-item"><div class="sb-val">${state.queue.length}</div><div class="sb-label">Items queued</div></div>
      <div class="sb-divider"></div>
      <div class="sb-item"><div class="sb-val">${autoItems.length}</div><div class="sb-label">Auto-flagged</div></div>
      <div class="sb-divider"></div>
      <div class="sb-item"><div class="sb-val">$${state.queue.reduce((s,i)=>s+i.gpoPrice*i.orderQty,0).toFixed(2)}</div><div class="sb-label">Est. GPO total</div></div>
      <div class="sb-spacer"></div>
      <button class="add-btn" onclick="openAddModal()"><i class="ti ti-plus"></i> Add item</button>
    </div>`;

  if (state.queue.length === 0) {
    html += `<div class="empty-card">
      <div class="empty-icon"><i class="ti ti-checkup-list"></i></div>
      <div class="empty-title">Queue is empty</div>
      <div class="empty-sub">All stock is above minimum. Use "Add item" to manually queue a product.</div>
    </div>`;
  } else {
    if (autoItems.length > 0) {
      html += `<div class="sec-label"><span class="sec-text">Auto-flagged below min</span><span class="sec-count">${autoItems.length}</span></div>`;
      html += buildQueueTable(autoItems);
    }
    if (manualItems.length > 0) {
      html += `<div class="sec-label" style="margin-top:${autoItems.length?'12px':'0'};"><span class="sec-text">Manually added</span><span class="sec-count">${manualItems.length}</span></div>`;
      html += buildQueueTable(manualItems);
    }
  }

  document.getElementById('content-area').innerHTML = html;
}

function buildQueueTable(items) {
  const rows = items.map(item => {
    const idx      = state.queue.indexOf(item);
    const isLow    = item.onHand < getMin(item.productName);
    const lineEst  = (item.gpoPrice * item.orderQty).toFixed(2);
    // On hand: Vetspire dispensing units (capsules, mL, tablets…)
    const ohLabel  = item.dispensingUnit ? `${item.onHand} ${item.dispensingUnit}` : item.onHand;
    // Order qty: Vetcove purchase units (bottle, box, case…)
    const puLabel  = item.purchaseUnit || '';
    return `
      <div class="q-row">
        <div class="q-name-cell" onclick="switchView('build')" title="View in Build PO">
          <div>
            <div class="q-name">${item.productName}</div>
            ${vendorBadge(item.vendor)}
          </div>
          <i class="ti ti-chevron-right q-name-arrow"></i>
        </div>
        <div class="q-onhand ${isLow ? 'low' : ''}">${ohLabel}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
          <span class="qty-num" id="qnum-${idx}">${item.orderQty}</span>
          <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
          ${puLabel ? `<span class="qty-unit">${puLabel}</span>` : ''}
        </div>
        <div class="q-price" id="qprice-${idx}">
          $${lineEst}
          ${item.priceYear ? `<div style="font-size:9px;color:var(--mist);margin-top:1px;">${item.priceYear} price</div>` : ''}
        </div>
        <button class="q-remove" onclick="removeItem(${idx})" title="Remove from queue"><i class="ti ti-x"></i></button>
      </div>`;
  }).join('');

  return `<div class="q-table">
    <div class="q-col-hdr">
      <span>Product</span><span>On hand</span><span>Order qty</span><span>Est. price</span><span></span>
    </div>${rows}</div>`;
}

// ── Build PO view ────────────────────────────────────────────────────────────
function renderBuildView() {
  const windowOpen = getWindowState() === 'open';
  const vendors    = groupByVendor();
  const vKeys      = Object.keys(vendors);
  let html = '';

  if (!windowOpen) {
    html += `<div class="window-warn">
      <i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0;"></i>
      <span>Outside Mon–Tue window — printing now will still work, but orders may not ship until next cycle. Best to wait for Monday.</span>
    </div>`;
  }

  if (state.queue.length === 0) {
    html += `<div class="empty-card">
      <div class="empty-icon"><i class="ti ti-file-invoice"></i></div>
      <div class="empty-title">No items in queue</div>
      <div class="empty-sub">Go to the Queue tab to add items first.</div>
    </div>`;
  } else {
    vKeys.forEach(vendor => {
      const items     = vendors[vendor];
      const vc        = VENDORS[vendor] || { color:'#4A5568', bg:'#F0EEF8', border:'#DDD9EC', threshold:500, place:'your rep' };
      const subtotal  = items.reduce((s,i) => s + i.gpoPrice * i.orderQty, 0);
      const isDone    = state.submitted.has(vendor);
      const remaining = vc.threshold - subtotal;

      let shippingHtml = '';
      if (isDone) {
        shippingHtml = `<div class="shipping-bar good"><i class="ti ti-check"></i> PO submitted for ${vendor}</div>`;
      } else if (remaining <= 0) {
        shippingHtml = `<div class="shipping-bar good"><i class="ti ti-truck"></i> Free shipping threshold met ($${vc.threshold} min)</div>`;
      } else if (remaining <= 150) {
        shippingHtml = `<div class="shipping-bar nudge"><i class="ti ti-truck"></i> Add <strong>&nbsp;$${remaining.toFixed(2)}&nbsp;</strong> more to reach free shipping ($${vc.threshold} minimum)</div>`;
      } else {
        shippingHtml = `<div class="shipping-bar none"><i class="ti ti-truck"></i> Free shipping at $${vc.threshold} · Currently $${subtotal.toFixed(2)}</div>`;
      }

      const isGenerated = state.generated && state.generated.has(vendor);
      const printBtnHtml = isDone
        ? `<div class="v-btn-group">
             <button class="v-print-btn done"><i class="ti ti-printer"></i> Printed</button>
             ${isGenerated
               ? `<button class="v-gen-btn done"><i class="ti ti-check"></i> PO in Receiving</button>`
               : `<button class="v-gen-btn" onclick="generatePO('${vendor}')"><i class="ti ti-file-plus"></i> Generate PO →</button>`}
           </div>`
        : `<div class="v-btn-group">
             <button class="v-print-btn" style="background:${vc.color};" onclick="printVendorPO('${vendor}')"><i class="ti ti-printer"></i> Print PO</button>
           </div>`;

      const itemRows = items.map(item => `
        <div class="v-item-row">
          <div class="vi-name">${item.productName}</div>
          <div class="vi-qty">× ${item.orderQty}</div>
          <div class="vi-price">$${item.gpoPrice.toFixed(2)}</div>
          <div class="vi-total">$${(item.gpoPrice * item.orderQty).toFixed(2)}</div>
        </div>`).join('');

      html += `<div class="vendor-card">
        <div class="vendor-header">
          <div class="v-dot" style="background:${vc.color};"></div>
          <div class="v-name">${vendor}</div>
          <div class="v-meta">${items.length} item${items.length !== 1 ? 's' : ''}</div>
          <div class="v-subtotal">$${subtotal.toFixed(2)}</div>
          ${printBtnHtml}
        </div>
        <div class="v-item-hdr"><span>Product</span><span>Qty</span><span>GPO Price</span><span>Line Total</span></div>
        ${itemRows}
        ${shippingHtml}
      </div>`;
    });
  }

  document.getElementById('content-area').innerHTML = html;
}

function groupByVendor() {
  const groups = {};
  state.queue.forEach(item => {
    if (!groups[item.vendor]) groups[item.vendor] = [];
    groups[item.vendor].push(item);
  });
  return groups;
}

// ── Queue actions ────────────────────────────────────────────────────────────
async function changeQty(idx, delta) {
  const item = state.queue[idx];
  const newQty = Math.max(1, item.orderQty + delta);
  item.orderQty = newQty;

  // Update in Supabase (best-effort)
  if (item.id && !item.id.startsWith('d')) {
    fetch(SUPA_URL + `/rest/v1/po_items?id=eq.${item.id}`, {
      method: 'PATCH', headers: { ...H, 'Prefer':'return=minimal' },
      body: JSON.stringify({ qty_ordered: newQty })
    }).catch(() => {});
  }

  const numEl   = document.getElementById('qnum-' + idx);
  const priceEl = document.getElementById('qprice-' + idx);
  if (numEl)   numEl.textContent   = newQty;
  if (priceEl) priceEl.textContent = '$' + (item.gpoPrice * newQty).toFixed(2);

  renderAll();
}

async function removeItem(idx) {
  const item = state.queue[idx];

  // Remove from Supabase (best-effort)
  if (item.id && !item.id.startsWith('d')) {
    fetch(SUPA_URL + `/rest/v1/po_items?id=eq.${item.id}`, {
      method: 'PATCH', headers: { ...H, 'Prefer':'return=minimal' },
      body: JSON.stringify({ status: 'removed' })
    }).catch(() => {});
  }

  state.queue.splice(idx, 1);
  renderAll();
  showToast('Removed from queue');
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchView(v) {
  state.view = v;
  document.getElementById('tab-queue').classList.toggle('active', v === 'queue');
  document.getElementById('tab-build').classList.toggle('active', v === 'build');

  const footerQueueBtn = document.querySelector('.sticky-footer .btn:not(.btn-primary)');
  if (footerQueueBtn) footerQueueBtn.style.display = v === 'build' ? 'flex' : 'none';

  renderAll();
}

async function generatePO(vendor) {
  const items = state.queue.filter(i => i.vendor === vendor);
  if (!items.length) return;

  const now = new Date();
  const ref = 'PO-' + now.toISOString().slice(0,10).replace(/-/g,'') + '-'
    + vendor.replace(/\s/g,'').slice(0,3).toUpperCase() + '-'
    + (state.locationName||'LOC').replace(/\s/g,'').toUpperCase().slice(0,4);

  const weekStart = now.toISOString().slice(0,10);

  // Update each queued po_item to status 'submitted' with the PO ref
  const updates = items.map(item =>
    fetch(SUPA_URL + `/rest/v1/po_items?id=eq.${item.id}`, {
      method: 'PATCH',
      headers: { ...H, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'submitted', po_number: ref, week_start: weekStart })
    })
  );

  try {
    await Promise.all(updates);
    state.generated.add(vendor);
    showToast(`✓ PO ${ref} sent to Receiving`);
    renderBuildView();
    // Reload queue so submitted items drop off the queued list
    await loadQueue();
  } catch(e) {
    showToast('Error generating PO — try again');
  }
}

async function logPOActivity(vendor, items, total, ref) {
  try {
    await fetch(SUPA_URL + '/rest/v1/activity_log', {
      method: 'POST',
      headers: { ...H, 'Prefer':'return=minimal' },
      body: JSON.stringify({
        location_id: state.locationId,
        event_type:  'order',
        description: `PO printed — ${vendor} · ${items.length} item${items.length!==1?'s':''} · $${total.toFixed(2)}`,
        reference_id: ref,
        flag:         getWindowState() === 'open' ? 'ok' : 'warn',
        metadata:     JSON.stringify({ vendor, items: items.length, total, window: getWindowState() })
      })
    });
  } catch(e) { /* best-effort */ }
}

// ── Add Item Modal ────────────────────────────────────────────────────────────
let selectedProduct = null;

function openAddModal() {
  selectedProduct = null;
  document.getElementById('modal-qty').value = '1';
  document.getElementById('modal-search').value = '';
  document.getElementById('modal-add-btn').disabled = true;
  filterProducts('');
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-search').focus(), 80);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  selectedProduct = null;
}

function filterProducts(q) {
  const lower = q.toLowerCase();
  const filtered = state.allProducts.filter(p =>
    p.name.toLowerCase().includes(lower) &&
    !state.queue.some(qi => qi.productName === p.name)  // hide already queued
  ).slice(0, 30);

  const list = document.getElementById('prod-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--mist);">No matching products</div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const sel = selectedProduct && selectedProduct.id === p.id;
    return `<div class="prod-opt ${sel?'sel':''}" onclick="selectProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div>
        <div class="po-name">${p.name}</div>
        <div class="po-meta">${p.vendor}</div>
      </div>
      <div class="po-oh">${p.onHand} on hand</div>
    </div>`;
  }).join('');
}

function selectProduct(p) {
  selectedProduct = p;
  document.getElementById('modal-vendor').value = p.vendor;
  document.getElementById('modal-add-btn').disabled = false;
  filterProducts(document.getElementById('modal-search').value);
}

async function addSelectedToQueue() {
  if (!selectedProduct) return;
  const qty    = parseInt(document.getElementById('modal-qty').value) || 1;
  const vendor = document.getElementById('modal-vendor').value;
  const unit   = getPrice(selectedProduct.name);
  const gpo    = Math.round(unit * 0.88 * 100) / 100;
  const wk     = getWeekStart();

  const newItem = {
    id:          'pending',
    productId:   selectedProduct.id,
    productName: selectedProduct.name,
    vendor,
    onHand:      selectedProduct.onHand || 0,
    orderQty:    qty,
    unitPrice:   unit,
    gpoPrice:    gpo,
    autoFlagged: false,
  };

  // Save to Supabase
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/po_items', {
      method: 'POST',
      headers: { ...H, 'Prefer':'return=representation' },
      body: JSON.stringify({
        location_id:  state.locationId,
        product_id:   selectedProduct.id,
        product_name: selectedProduct.name,
        vendor,
        qty_ordered:  qty,
        unit_price:   unit,
        gpo_price:    gpo,
        on_hand:      selectedProduct.onHand || 0,
        week_start:   wk,
        status:       'queued',
        auto_flagged: false,
      })
    });
    const saved = await res.json();
    if (Array.isArray(saved) && saved[0]) newItem.id = saved[0].id;
  } catch(e) { /* best-effort */ }

  state.queue.push(newItem);
  closeAddModal();
  renderAll();
  showToast(selectedProduct.name + ' added to queue');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => { t.style.opacity = '0'; }, 2600);
}

// ── Parent app messages ───────────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'setLocation') return;
  const sel = document.getElementById('loc-select');
  if (!sel || sel.options.length <= 1) return;
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].text === e.data.loc) {
      sel.value = sel.options[i].value;
      onLocChange();
      break;
    }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
boot();
