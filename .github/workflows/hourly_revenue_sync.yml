name: Hourly Revenue Sync

# Pulls today's revenue for all 4 locations every hour and upserts to daily_revenue.
# Uses the existing nightly_revenue_sync.py which already handles today + yesterday.

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour, 24/7
  workflow_dispatch:       # manual trigger from GitHub Actions UI
  push:
    branches: [main]       # backstop: sync on every deploy

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync today's revenue for all locations
        env:
          VETSPIRE_API_TOKEN: ${{ secrets.VETSPIRE_API_TOKEN }}
        run: python3 nightly_revenue_sync.py
