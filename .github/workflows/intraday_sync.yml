name: Intraday Vetspire Sync

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:        # manual trigger from GitHub Actions UI
  push:
    branches: [main]        # backstop: sync on every deploy

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Pull today's dispensed items for all locations
        env:
          VETSPIRE_API_TOKEN: ${{ secrets.VETSPIRE_API_TOKEN }}
        run: python3 vetspire_intraday_sync.py
