name: Nightly Vetspire Sync

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests supabase python-dotenv
      - name: Run Vetspire daily sync
        env:
          VETSPIRE_API_TOKEN: ${{ secrets.VETSPIRE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 vetspire_daily_sync.py

      - name: Run nightly revenue sync
        env:
          VETSPIRE_API_TOKEN: ${{ secrets.VETSPIRE_API_TOKEN }}
        run: python3 nightly_revenue_sync.py
