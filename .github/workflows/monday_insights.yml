name: Monday Insights Refresh

on:
  schedule:
    - cron: '7 13 * * 1'   # 8:07am CT (UTC-5) every Monday
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run insights refresh
        run: python3 monday_insights_refresh.py

      - name: Send weekly insights email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 monday_email.py

      - name: Push changes
        run: |
          git config user.name  "MedSync Insights Bot"
          git config user.email "bot@medsync.vet"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes — insights unchanged this week."
          else
            git commit -m "chore: Monday insights refresh $(date -u +%Y-%m-%d)"
            git push
          fi
