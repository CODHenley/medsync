name: Usage Min/Max Sync

on:
  schedule:
    - cron: '0 6 * * *'   # midnight CT (UTC-6 standard / UTC-5 daylight)
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run usage min/max sync
        env:
          VETSPIRE_API_TOKEN: ${{ secrets.VETSPIRE_API_TOKEN }}
          SUPA_SERVICE_KEY:   ${{ secrets.SUPA_SERVICE_KEY }}
        run: python3 usage_minmax_sync.py
